<!DOCTYPE html>
<!-- SBS Liquidaciones v2.1 -->
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SBS Liquidaciones</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg:  #f4f4f4; --bg2: #ffffff; --bg3: #ebebeb;
  --border: #d8d8d8; --border2: #b8b8b8;
  --text: #111111; --text2: #555555; --text3: #999999;
  --accent: #111111; --accent2: #333333;
  --green: #2d6a2d; --green-bg: #e8f5e8; --green-border: #a8d4a8;
  --orange: #7a4500; --orange-bg: #fdf0e0; --orange-border: #e8c080;
  --blue: #2a2a2a; --blue-bg: #efefef; --blue-border: #c0c0c0;
  --red: #8b0000; --red-bg: #faeaea;
  --purple: #3a3a3a; --purple-bg: #eeeeee;
  --radius: 8px; --radius-lg: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 13px; }

/* ── LOGIN ── */
.login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #ffffff; flex-direction: column; gap: 20px; }
.login-card { background: rgba(15,15,15,0.88); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 32px 36px; width: 400px; backdrop-filter: blur(8px); }
.login-logo { font-size: 18px; font-weight: 700; letter-spacing: -.3px; margin-bottom: 4px; color: #ffffff; }
.login-sub  { font-size: 12px; color: #888; margin-bottom: 28px; }
.login-err  { background: var(--red-bg); color: var(--red); border: 1px solid #f0bcbc; border-radius: var(--radius); padding: 8px 11px; font-size: 12.5px; margin-bottom: 12px; display: none; }

/* ── APP LAYOUT ── */
.app { display: flex; height: 100vh; }
.sb  { width: 224px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
.sb-logo { padding: 18px 16px 14px; border-bottom: 1px solid var(--border); }
.sb-logo-t { font-size: 14px; font-weight: 700; letter-spacing: -.2px; }
.sb-logo-s { font-size: 11px; color: var(--text3); margin-top: 2px; }
.sb-nav    { padding: 8px 4px; flex: 1; overflow-y: auto; }
.sb-bottom { padding: 10px 8px; border-top: 1px solid var(--border); }
.sb-user   { display: flex; align-items: center; gap: 9px; padding: 7px 8px; border-radius: var(--radius); }
.sb-user-name { font-size: 12px; font-weight: 500; }
.sb-user-role { font-size: 11px; color: var(--text2); }
.sb-sec  { padding: 10px 10px 3px; font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .8px; }
.sb-item { display: flex; align-items: center; gap: 9px; padding: 7px 12px; border-radius: var(--radius); cursor: pointer; font-size: 13px; color: var(--text2); margin: 1px 2px; transition: background .1s, color .1s; }
.sb-item:hover  { background: var(--bg3); color: var(--text); }
.sb-item.active { background: var(--bg3); color: var(--text); font-weight: 500; }
.sb-item i { font-size: 16px; width: 18px; flex-shrink: 0; }
.sb-item.disabled { opacity: .4; pointer-events: none; }
.main    { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar  { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 22px; height: 54px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.topbar-t  { font-size: 15px; font-weight: 600; }
.topbar-ac { display: flex; gap: 8px; }
.content   { flex: 1; overflow-y: auto; padding: 22px; }

/* ── Buttons ── */
.btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 13px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--bg2); color: var(--text); font-size: 12.5px; cursor: pointer; font-family: inherit; font-weight: 400; transition: background .12s; white-space: nowrap; }
.btn:hover { background: var(--bg3); }
.btn:disabled { opacity: .5; cursor: not-allowed; }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { background: var(--accent2); }
.btn-success { background: var(--green); color: #fff; border-color: var(--green); }
.btn-success:hover { background: #2a4f0c; }
.btn-sm     { padding: 4px 9px; font-size: 11.5px; }
.btn-danger { border-color: #f0bcbc; color: var(--red); }
.btn-danger:hover { background: var(--red-bg); }

/* ── Cards ── */
.card    { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px; box-shadow: var(--shadow); }
.grid2   { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.grid4   { display: grid; grid-template-columns: repeat(4,1fr); gap: 11px; }
.metric  { background: var(--bg3); border-radius: var(--radius); padding: 13px 15px; border: 1px solid var(--border); }
.metric-l { font-size: 11.5px; color: var(--text2); margin-bottom: 3px; }
.metric-v { font-size: 22px; font-weight: 600; letter-spacing: -.5px; }
.metric-s { font-size: 11px; color: var(--text3); margin-top: 2px; }

/* ── Table ── */
table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
th { text-align: left; padding: 7px 10px; font-size: 10.5px; font-weight: 600; color: var(--text2); border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: .5px; background: var(--bg3); }
td { padding: 7px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg3); }

/* ── Badges ── */
.badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
.bs { background: var(--green-bg); color: var(--green); }
.bw { background: var(--orange-bg); color: var(--orange); }
.bi { background: var(--blue-bg); color: var(--blue); }
.bg { background: var(--bg3); color: var(--text2); }
.bd { background: var(--red-bg); color: var(--red); }
.bn { background: var(--purple-bg); color: var(--purple); }
.chip { display: inline-flex; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
.chip-ext   { background: #fdf0e0; color: #7a4500; border: 1px solid #e8c080; }
.chip-arena { background: #e8f0fa; color: #1a3a6e; border: 1px solid #a8c0e0; }
.chip-fijos { background: #ebebeb; color: #444; border: 1px solid #c8c8c8; }
.chip-polo  { background: #fae8f0; color: #7a1a4e; border: 1px solid #e0a0c0; }
.chip-colon { background: #fdebe0; color: #8a3a00; border: 1px solid #e8b080; }
.chip-eco   { background: #e8f5e8; color: #1a5a2e; border: 1px solid #a0d0a8; }

/* ── Inputs ── */
input, select, textarea { width: 100%; padding: 7px 10px; border: 1px solid var(--border2); border-radius: var(--radius); font-size: 12.5px; font-family: inherit; background: var(--bg2); color: var(--text); outline: none; transition: border-color .12s; }
input:focus, select:focus { border-color: var(--accent); }
input:disabled, select:disabled { opacity: .6; cursor: not-allowed; background: var(--bg3); }
.fg { margin-bottom: 13px; }
.fl { font-size: 11.5px; font-weight: 500; color: var(--text2); margin-bottom: 4px; display: block; }
.fr  { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }

/* ── Alerts ── */
.alert { padding: 9px 13px; border-radius: var(--radius); font-size: 12.5px; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; line-height: 1.4; }
.alert-info { background: #f0f0f0; color: #333; border: 1px solid #c8c8c8; }
.alert-warn { background: var(--orange-bg); color: var(--orange); border: 1px solid var(--orange-border); }
.alert-ok   { background: var(--green-bg);  color: var(--green);  border: 1px solid var(--green-border); }

/* ── Modal ── */
.mo { position: fixed; inset: 0; background: rgba(0,0,0,.36); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 16px; }
.modal    { background: var(--bg2); border-radius: var(--radius-lg); padding: 22px; width: 520px; max-width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,.18); }
.modal-lg { width: 720px; }
.modal-t  { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
.modal-s  { font-size: 11.5px; color: var(--text2); margin-bottom: 18px; }
.modal-f  { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--border); }

/* ── Ev cards ── */
.ev-card   { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); }
.fecha-row { display: flex; align-items: center; gap: 9px; padding: 7px 11px; border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 5px; font-size: 12.5px; background: var(--bg2); transition: background .1s; }
.fecha-row:hover { background: var(--bg3); }
.pill { background: var(--bg3); border-radius: 20px; padding: 2px 8px; font-size: 11px; color: var(--text2); white-space: nowrap; }
.fb   { display: inline-flex; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; white-space: nowrap; }
.fb-o { background: var(--blue-bg);   color: var(--blue); }
.fb-p { background: var(--orange-bg); color: var(--orange); }
.fb-c { background: var(--green-bg);  color: var(--green); }

/* ── Quincena ── */
.qrow   { border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 8px; overflow: hidden; }
.qrow-h { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; cursor: pointer; background: var(--bg2); transition: background .1s; }
.qrow-h:hover { background: var(--bg3); }
.qrow-b { border-top: 1px solid var(--border); background: var(--bg3); }
.qrow-line { display: flex; justify-content: space-between; padding: 5px 14px; font-size: 11.5px; border-bottom: 1px solid var(--border); color: var(--text2); gap: 8px; }
.qrow-line:last-child { border-bottom: none; }
.qrow-line span:last-child { font-weight: 500; color: var(--text); white-space: nowrap; }

/* ── Verificacion ── */
.ver-wrap  { overflow-x: auto; }
.ver-table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 700px; }
.ver-table th { text-align: left; padding: 6px 7px; font-size: 10px; font-weight: 600; color: var(--text2); border-bottom: 1px solid var(--border); text-transform: uppercase; white-space: nowrap; background: var(--bg3); }
.ver-table td { padding: 3px 5px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.ver-table input { padding: 3px 6px; font-size: 11.5px; }
.ver-table tr.ausente td:not(.tdc) { opacity: .38; }
.ver-table tr.sel  { background: #eef4ff; }
.ver-table tr.sel td:not(.tdc) { opacity: 1; }
.ver-table tr:last-child td { border-bottom: none; }
.sec-bar { background: var(--bg3); padding: 6px 11px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); font-size: 11.5px; }
.toggle { width: 28px; height: 16px; border-radius: 8px; border: none; cursor: pointer; position: relative; flex-shrink: 0; padding: 0; transition: background .12s; }
.toggle.on  { background: var(--green); }
.toggle.off { background: var(--border2); }
.toggle::after { content: ''; position: absolute; top: 2px; width: 12px; height: 12px; border-radius: 50%; background: #fff; transition: left .1s; }
.toggle.on::after  { left: 14px; }
.toggle.off::after { left: 2px; }
.bulk-bar { position: sticky; top: 0; z-index: 10; background: var(--accent); color: #fff; padding: 9px 13px; display: flex; align-items: center; gap: 8px; border-radius: var(--radius); margin-bottom: 11px; font-size: 12.5px; flex-wrap: wrap; }
.bulk-bar input { background: rgba(255,255,255,.14); color: #fff; border-color: rgba(255,255,255,.28); font-size: 12px; padding: 4px 7px; }
.bulk-bar input::placeholder { color: rgba(255,255,255,.5); }
.chk { width: 14px; height: 14px; cursor: pointer; accent-color: var(--accent); flex-shrink: 0; }
.steps    { display: flex; align-items: center; margin-bottom: 20px; }
.step     { display: flex; align-items: center; gap: 7px; font-size: 12.5px; color: var(--text2); }
.step.active { color: var(--text); font-weight: 500; }
.step.done   { color: var(--green); }
.step-num { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10.5px; font-weight: 600; border: 1px solid var(--border2); flex-shrink: 0; }
.step.active .step-num { background: var(--accent); color: #fff; border-color: var(--accent); }
.step.done   .step-num { background: var(--green-bg); color: var(--green); border-color: var(--green-border); }
.step-sep { width: 28px; height: 1px; background: var(--border); margin: 0 3px; }
.drop-zone { border: 1.5px dashed var(--border2); border-radius: var(--radius-lg); padding: 28px; text-align: center; cursor: pointer; transition: all .14s; }
.drop-zone:hover, .drop-zone.dov { border-color: var(--accent); background: var(--bg3); }
.empty-state { text-align: center; padding: 44px 20px; color: var(--text2); }
.empty-state i { font-size: 36px; display: block; margin-bottom: 10px; color: var(--text3); }

/* ── Spinner ── */
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Toast ── */
.toast { position: fixed; bottom: 20px; right: 20px; background: var(--accent); color: #fff; padding: 10px 16px; border-radius: var(--radius); font-size: 13px; z-index: 200; box-shadow: 0 4px 16px rgba(0,0,0,.2); animation: fadeIn .2s; }
.toast.ok  { background: var(--green); }
.toast.err { background: var(--red); }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* ── Loading overlay ── */
.loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,.7); display: flex; align-items: center; justify-content: center; z-index: 300; }
.loading-box { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px 32px; text-align: center; box-shadow: var(--shadow); }
</style>
</head>

<script>
// ══════════════════════════════════════════════
// CONFIG — reemplazar con tus valores de Supabase
// ══════════════════════════════════════════════
const SUPABASE_URL = window.ENV_SUPABASE_URL || 'https://tvggknkvrjsuhnfahtzl.supabase.co';
const SUPABASE_ANON_KEY = window.ENV_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR2Z2drbmt2cmpzdWhuZmFodHpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MDg2MzMsImV4cCI6MjA5NzI4NDYzM30.GjZl4U-VDXzLw21-eMOT3FZUgIdAL_am25z4w_fW6oE';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
const APP = {
  user: null,
  rol: null,        // 'rrhh' | 'administracion'
  page: 'db',
  draft: null,
  // cache local (se recarga desde Supabase al navegar)
  personal: [],
  tarifario: [],
  eventos: [],
  quincenas: [],
  liquidaciones: [],
};

// ══════════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════════
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const btn   = document.getElementById('login-btn');
  const err   = document.getElementById('login-err');
  err.style.display = 'none';
  btn.innerHTML = '<span class="spinner"></span> Ingresando...';
  btn.disabled = true;

  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) {
    err.textContent = 'Email o contraseña incorrectos.';
    err.style.display = 'block';
    btn.innerHTML = 'Iniciar sesión';
    btn.disabled = false;
    return;
  }
  await initApp(data.user);
}

async function initApp(user) {
  APP.user = user;
  // Obtener rol
  const { data: roleRow } = await sb.from('user_roles').select('rol').eq('user_id', user.id).single();
  APP.rol = roleRow?.rol || null;

  if (!APP.rol) {
    await sb.auth.signOut();
    showErr('Tu usuario no tiene rol asignado. Contactá al administrador.');
    document.getElementById('login-btn').innerHTML = 'Iniciar sesión';
    document.getElementById('login-btn').disabled = false;
    return;
  }

  // Mostrar app
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('app-page').style.display = 'block';
  document.getElementById('user-email-label').textContent = user.email;
  document.getElementById('user-role-label').textContent = APP.rol === 'rrhh' ? 'RRHH' : 'Administración';

  // Ocultar secciones de gestión para administración
  if (APP.rol === 'administracion') {
    document.getElementById('nav-sec-gestion').style.display = 'none';
    ['n-personal','n-tarifario','n-importar','n-cbu','n-externos','n-arena'].forEach(id => {
      const el = document.getElementById(id);
      if (id === 'n-externos' || id === 'n-arena') return; // los ve pero solo exporta
      if (el) el.classList.add('disabled');
    });
    go('arena'); // Administración entra directo a liquidaciones Arena
  } else {
    go('db');
  }
}

async function doLogout() {
  await sb.auth.signOut();
  location.reload();
}

function showErr(msg) {
  const err = document.getElementById('login-err');
  err.textContent = msg;
  err.style.display = 'block';
}

// Chequear sesión activa al cargar
sb.auth.getSession().then(({ data: { session } }) => {
  if (session) initApp(session.user);
});

// ══════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════
function uid()  { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
function fmt(n) { return new Intl.NumberFormat('es-AR', { style:'currency', currency:'ARS', maximumFractionDigits:0 }).format(n || 0); }
function fd(d)  { if (!d) return '—'; const p = String(d).split('-'); return p.length === 3 ? `${p[2]}/${p[1]}/${p[0]}` : d; }
function $v(id) { const e = document.getElementById(id); return e ? e.value.trim() : ''; }

function toast(msg, type = '') {
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function loading(show) {
  let ov = document.getElementById('loading-ov');
  if (show) {
    if (!ov) {
      ov = document.createElement('div'); ov.id = 'loading-ov'; ov.className = 'loading-overlay';
      ov.innerHTML = '<div class="loading-box"><div class="spinner" style="border-color:rgba(0,0,0,.15);border-top-color:var(--accent);width:24px;height:24px;margin:0 auto 10px"></div><div style="font-size:13px;color:var(--text2)">Cargando...</div></div>';
      document.body.appendChild(ov);
    } else ov.style.display = 'flex';
  } else { if (ov) ov.style.display = 'none'; }
}

const TITLES = { db:'Dashboard', personal:'Personal', tarifario:'Tarifario', importar:'Importar planilla', cbu:'Importar CBU', externos:'Externos', arena:'Movistar Arena', fijos:'Servicios Fijos' };

async function go(page) {
  APP.page = page;
  document.querySelectorAll('.sb-item').forEach(e => e.classList.remove('active'));
  const n = document.getElementById('n-' + page); if (n) n.classList.add('active');
  document.getElementById('topbar-t').textContent = TITLES[page] || '';
  document.getElementById('topbar-ac').innerHTML = '';
  document.getElementById('content').innerHTML = '';
  await render();
}

async function render() {
  const el = document.getElementById('content');
  const ac = document.getElementById('topbar-ac');
  loading(true);
  try {
    await ({ db:pgDB, personal:pgPersonal, tarifario:pgTarifario, importar:pgImportar, cbu:pgCBU, externos:pgExternos, arena:pgArena, fijos:pgFijos })[APP.page]?.(el, ac);
  } catch (e) {
    el.innerHTML = `<div class="alert alert-warn"><i class="ti ti-alert-circle"></i> Error cargando: ${e.message}</div>`;
    console.error(e);
  }
  loading(false);
}

// ══════════════════════════════════════════════
async function fetchAll() {
  const [p, t, ev, q, liq] = await Promise.all([
    sb.from('personal').select('*').order('apellido'),
    sb.from('tarifario').select('*').order('posicion'),
    sb.from('eventos').select('*, fechas(*, presentismo(*))').order('created_at'),
    sb.from('quincenas').select('*').order('fecha_inicio'),
    sb.from('liquidaciones').select('*').order('created_at', { ascending: false }),
  ]);
  APP.personal      = p.data  || [];
  APP.tarifario     = t.data  || [];
  APP.eventos       = ev.data || [];
  APP.quincenas     = q.data  || [];
  APP.liquidaciones = liq.data || [];
}

// ── helpers de acceso local (post-fetch) ──
function getEvento(id)   { return APP.eventos.find(e => e.id === id); }
function getPersona(id)  { return APP.personal.find(p => p.id === id); }
// Busca tarifa por nombre de posición. Si se pasa `area`, prioriza coincidencias de esa área
// (o "General") para evitar cruces cuando el mismo nombre de posición existe en varias áreas
// (ej: "Supervisor" en Ecoparque y en Movistar Arena con montos distintos).
function getTarifa(pos, area) {
  if (area) {
    const enArea = APP.tarifario.find(t => t.posicion === pos && (t.area === area || t.area === 'General'));
    if (enArea) return enArea;
  }
  return APP.tarifario.find(t => t.posicion === pos);
}
function chipClaseArea(area) {
  if (area === 'Externos') return 'chip-ext';
  if (area === 'Movistar Arena') return 'chip-arena';
  if (area === 'Campo de Polo') return 'chip-polo';
  if (area === 'Teatro Colón') return 'chip-colon';
  if (area === 'Ecoparque') return 'chip-eco';
  return 'chip-fijos';
}
// Calcula subtotal de Servicios Fijos considerando tarifa diferencial por duración de jornada.
// Busca en el tarifario dos posiciones derivadas de `posBase`:
//   "<posBase> [Jornada 6 hs.]" y "<posBase> [Jornada 8 hs.]"
// Si no existen esas variantes, usa una sola tarifa (tar) para todas las jornadas.
function getTarifaSemanaFinde(posBase) {
  const tSemana = APP.tarifario.find(t => t.posicion === `${posBase} [Jornada 6 hs.]`);
  const tFinde  = APP.tarifario.find(t => t.posicion === `${posBase} [Jornada 8 hs.]`);
  return { tSemana, tFinde };
}
function calcSubtotalFijo(posBaseOTar, jornadasSemana, jornadasFinde) {
  // Acepta posicion (string) o un objeto tarifario ya resuelto (compatibilidad)
  const posBase = typeof posBaseOTar === 'string' ? posBaseOTar : posBaseOTar?.posicion;
  if (!posBase) return 0;
  const { tSemana, tFinde } = getTarifaSemanaFinde(posBase);
  if (tSemana || tFinde) {
    return (tSemana?.monto||0)*jornadasSemana + (tFinde?.monto||0)*jornadasFinde;
  }
  // Fallback: posición única (no Colón / sin variantes semana-finde)
  const tar = APP.tarifario.find(t => t.posicion === posBase);
  return (tar?.monto||0) * (jornadasSemana + jornadasFinde);
}
function liqsF(evId, fechaId) { return APP.liquidaciones.filter(l => l.evento_id === evId && l.fecha_id === fechaId); }

function stF(ev, fechaId) {
  const f = (ev.fechas||[]).find(f => f.id === fechaId);
  const pres = f?.presentismo || [];
  if (!pres.length) return 'o';
  const l = liqsF(ev.id, fechaId);
  if (!l.length) return 'o';
  if (l.every(x => x.estado === 'pagado')) return 'c';
  return 'p';
}

    ? APP.tarifario.filter(t => t.area === areaParaFiltro || t.area === 'General')

async function pgExternos(el, ac) {
  await fetchAll();
  const evs    = APP.eventos.filter(e => e.area === 'Externos');
  const liqExt = APP.liquidaciones.filter(l => l.area === 'Externos');
  const isRRHH = APP.rol === 'rrhh';

  // Monto a liquidar: fechas con presentismo sin liquidación aún
  let montoALiquidar = 0;
  evs.forEach(ev => {
    (ev.fechas||[]).forEach(f => {
      const yaLiq = liqsF(ev.id, f.id).map(l => l.persona_id);
      (f.presentismo||[]).filter(p => !yaLiq.includes(p.persona_id)).forEach(p => {
        const t = getTarifa(p.posicion, 'Externos');
        montoALiquidar += t?.monto || 0;
      });
    });
  });

  const totalLiquidado = liqExt.reduce((s,l) => s+(l.total||0), 0);
  const fechasPend = evs.reduce((s,e) => s + (e.fechas||[]).filter(f=>(f.presentismo||[]).length && !liqsF(e.id,f.id).length).length, 0);

  if (isRRHH) ac.innerHTML = `<button class="btn btn-primary" onclick="modalNuevoEv()"><i class="ti ti-plus"></i> Nuevo evento</button>`;

  el.innerHTML = `
    <div class="grid4" style="margin-bottom:18px">
      <div class="metric"><div class="metric-l">Eventos</div><div class="metric-v">${evs.length}</div></div>
      <div class="metric"><div class="metric-l">Fechas totales</div><div class="metric-v">${evs.reduce((s,e)=>(e.fechas||[]).length+s,0)}</div>
        <div class="metric-s">${fechasPend} sin liquidar</div></div>
      <div class="metric"><div class="metric-l">Monto a liquidar</div><div class="metric-v" style="font-size:17px">${fmt(montoALiquidar)}</div>
        <div class="metric-s">pendiente de generar</div></div>
      <div class="metric"><div class="metric-l">Total liquidado</div><div class="metric-v" style="font-size:17px">${fmt(totalLiquidado)}</div>
        <div class="metric-s">${liqExt.length} liquidaciones</div></div>
    </div>
    ${!evs.length
      ? '<div class="empty-state"><i class="ti ti-calendar-off"></i><p>Sin eventos.</p></div>'
      : evs.map(ev => renderEvExt(ev, isRRHH)).join('')}`;
}

// ── DIAGNÓSTICO: liquidaciones de Arena con monto cruzado de otra área (bug histórico) ──
// Las liquidaciones de Arena guardan el detalle por jornada en el campo `detalle` (JSONB),
// cada línea con su propia posición y monto. Hay que recalcular cada línea individualmente.
window.diagnosticarLiqArena = async function() {
  await fetchAll();
  const liqArena = APP.liquidaciones.filter(l => l.area === 'Movistar Arena');
  const correcciones = []; // [{ id, detalleCorregido, totalCorregido, lineasAfectadas:[{persona,posicion,actual,correcto}] }]

  liqArena.forEach(l => {
    const detalle = l.detalle || [];
    if (!detalle.length) return;
    let cambio = false;
    const lineasAfectadas = [];
    const detalleCorregido = detalle.map(linea => {
      const tarCorrecta = getTarifa(linea.posicion, 'Movistar Arena');
      if (!tarCorrecta) return linea; // sin tarifa en Arena para esa posición, no se toca
      const montoCorrecto = tarCorrecta.monto;
      if ((linea.monto||0) !== montoCorrecto) {
        cambio = true;
        lineasAfectadas.push({ posicion: linea.posicion, actual: linea.monto||0, correcto: montoCorrecto });
        return { ...linea, monto: montoCorrecto, sin_tarifa: false };
      }
      return linea;
    });
    if (cambio) {
      const totalCorregido = detalleCorregido.reduce((s,x) => s + (x.monto||0), 0);
      correcciones.push({
        id: l.id, persona_nombre: l.persona_nombre, periodo: l.periodo, estado: l.estado,
        totalActual: l.total||0, totalCorregido, detalleCorregido, lineasAfectadas
      });
    }
  });

  if (!correcciones.length) {
    showModal(`<div class="modal"><div class="modal-t">Revisión de montos — Movistar Arena</div>
      <div class="modal-s">No se encontraron diferencias. Todas las liquidaciones de Arena tienen el monto correcto según el tarifario actual.</div>
      <div class="modal-f"><button class="btn btn-primary" onclick="closeModal()">Cerrar</button></div>
    </div>`);
    return;
  }

  const totalDiferencia = correcciones.reduce((s,c) => s + (c.totalCorregido - c.totalActual), 0);
  showModal(`<div class="modal modal-lg">
    <div class="modal-t">Revisión de montos — Movistar Arena</div>
    <div class="modal-s">${correcciones.length} liquidación${correcciones.length>1?'es':''} con al menos una jornada cruzada con otra área (Orientador/Supervisor compartidos con Ecoparque).</div>
    <div style="max-height:320px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px">
      <table style="width:100%"><thead><tr style="font-size:11px;color:var(--text2)">
        <th style="text-align:left;padding:6px 10px">Persona</th><th style="text-align:left;padding:6px 10px">Período</th>
        <th style="text-align:left;padding:6px 10px">Jornadas afectadas</th>
        <th style="text-align:right;padding:6px 10px">Actual</th><th style="text-align:right;padding:6px 10px">Correcto</th>
        <th style="text-align:left;padding:6px 10px">Estado</th>
      </tr></thead><tbody>
      ${correcciones.map(c => `<tr style="font-size:12px;border-top:1px solid var(--border)">
        <td style="padding:6px 10px">${c.persona_nombre}</td>
        <td style="padding:6px 10px">${c.periodo||'—'}</td>
        <td style="padding:6px 10px">${c.lineasAfectadas.map(la=>`${la.posicion} (${fmt(la.actual)}→${fmt(la.correcto)})`).join(', ')}</td>

window.importarShowArena = async function(evId) {
  const ev = APP.eventos.find(e => e.id === evId);
  if (!ev) return;
  loading(true);
  // Buscar fecha existente o crear una nueva con la fecha del show
  let fechaId = null;

    // Usar la primera fecha existente

window.verShowArena = function(evId) {
  const ev    = getEvento(evId);
  const fechas = ev?.fechas || [];

  const presentes = [];
  fechas.forEach(f => {
    (f.presentismo||[]).forEach(p => {
      const per = APP.personal.find(x => x.id === p.persona_id);
      const tar = getTarifa(p.posicion, 'Movistar Arena');
      presentes.push({ fechaId:f.id, per, posicion:p.posicion, monto:tar?.monto||0, sinTarifa:!tar });
    });
  });

  presentes.sort((a,b) => a.monto - b.monto);
  const totalMonto = presentes.reduce((s,p) => s+p.monto, 0);
  const sinTarifaN = presentes.filter(p => p.sinTarifa).length;

  showModal(`<div class="modal modal-lg">
    <div class="modal-t">${ev.nombre}${ev.fecha?' · '+fd(ev.fecha):''}</div>
    <div class="modal-s">${presentes.length} presentes · <strong id="total-show-lbl">${fmt(totalMonto)}</strong> total estimado</div>
    ${sinTarifaN ? `<div class="alert alert-warn" style="padding:8px 12px"><i class="ti ti-alert-triangle"></i> ${sinTarifaN} persona${sinTarifaN>1?'s':''} sin tarifa.</div>` : ''}
    <div class="alert alert-info" style="padding:8px 12px"><i class="ti ti-edit" style="font-size:13px"></i> Podés cambiar la posición — el monto se actualiza automáticamente.</div>
    <table><thead><tr>
      <th>Apellido y nombre</th><th>CUIL</th><th>Posición</th><th style="text-align:right">Monto</th>
    </tr></thead>
    <tbody>${presentes.map(p => `<tr>
      <td><strong>${p.per?.apellido||'?'}, ${p.per?.nombre||'?'}</strong></td>
      <td style="font-family:monospace;font-size:11.5px">${p.per?.cuil||'—'}</td>
      <td><select style="font-size:12px;padding:3px 6px" onchange="updatePresentismo('${p.fechaId}','${p.per?.id}',this.value)">
        ${APP.tarifario.filter(t => t.area === 'Movistar Arena' || t.area === 'General').map(t => `<option value="${t.posicion}" ${t.posicion===p.posicion?'selected':''}>${t.posicion}</option>`).join('')}
      </select></td>
      <td style="text-align:right;font-weight:500" id="monto-cell-${p.fechaId}-${p.per?.id}">${p.sinTarifa?'<span style="color:var(--orange)">sin tarifa</span>':fmt(p.monto)}</td>
    </tr>`).join('')}</tbody>
    <tfoot><tr>
      <td colspan="3" style="font-weight:600;padding:10px 10px;border-top:2px solid var(--border)">Total</td>
      <td style="text-align:right;font-weight:700;font-size:15px;padding:10px 10px;border-top:2px solid var(--border)" id="total-show-footer">${fmt(totalMonto)}</td>
    </tr></tfoot>
    </table>
    <div class="modal-f">
      <button class="btn" onclick="closeModal()">Cerrar</button>
      <button class="btn" onclick="exportShowArenaPreview('${evId}')"><i class="ti ti-file-spreadsheet"></i> Exportar Excel</button>
    </div>
  </div>`);
};

window.updatePresentismo = async function(fechaId, personaId, nuevaPosicion) {
  await sb.from('presentismo').update({ posicion: nuevaPosicion }).eq('fecha_id', fechaId).eq('persona_id', personaId);
  // Actualizar cache local
  APP.eventos.forEach(ev => {
    (ev.fechas||[]).forEach(f => {
      if (f.id === fechaId) {
        const p = (f.presentismo||[]).find(x => x.persona_id === personaId);
        if (p) p.posicion = nuevaPosicion;
      }
    });
  });
  // Actualizar celda de monto
  const tar = getTarifa(nuevaPosicion, 'Movistar Arena');
  const cell = document.getElementById(`monto-cell-${fechaId}-${personaId}`);
  if (cell) cell.innerHTML = tar ? fmt(tar.monto) : '<span style="color:var(--orange)">sin tarifa</span>';
  // Recalcular total
  let total = 0;
  document.querySelectorAll('[id^="monto-cell-"]').forEach(c => {
    const n = parseInt(c.textContent.replace(/[^0-9]/g,''));
    if (!isNaN(n)) total += n;
  });
  const lbl = document.getElementById('total-show-lbl');
  const foot = document.getElementById('total-show-footer');
  if (lbl) lbl.textContent = fmt(total);
  if (foot) foot.textContent = fmt(total);
  toast('Posición actualizada', 'ok');
};

window.previaCierre = function(qId, definitivo) {
  const q     = APP.quincenas.find(x => x.id === qId);
  const shows = APP.eventos.filter(e => e.area === 'Movistar Arena' && e.quincena_id === qId);

  const jornadas = [];
  shows.forEach(ev => {
    (ev.fechas||[]).forEach(f => {
      (f.presentismo||[]).forEach(p => {
        const t = getTarifa(p.posicion, 'Movistar Arena');
        jornadas.push({ persona_id:p.persona_id, ev_nombre:ev.nombre, fecha:f.fecha, posicion:p.posicion, monto:t?.monto||0, sin_tarifa:!t });
      });
    });
  });

  const mapa = {};
  jornadas.forEach(j => {
    if (!mapa[j.persona_id]) mapa[j.persona_id] = { persona_id:j.persona_id, lineas:[], total:0, sin_tarifa:false };
    mapa[j.persona_id].lineas.push(j);
    mapa[j.persona_id].total += j.monto;
    if (j.sin_tarifa) mapa[j.persona_id].sin_tarifa = true;
  });

  const cons   = Object.values(mapa).sort((a,b) => a.total - b.total);
  const stN    = cons.filter(c => c.sin_tarifa).length;
  const totalG = cons.reduce((s, c) => s + c.total, 0);

  const titulo = definitivo
    ? `Cerrar quincena definitivamente — ${q.nombre}`
    : `Vista previa de liquidación — ${q.nombre}`;

  const alertaInfo = definitivo
    ? `<div class="alert alert-warn" style="padding:8px 12px"><i class="ti ti-lock"></i> Esta acción es <strong>definitiva</strong>. La quincena quedará cerrada y no podrás agregar más shows.</div>`
    : `<div class="alert alert-info" style="padding:8px 12px"><i class="ti ti-eye"></i> <strong>Vista previa</strong> — podés exportar el Excel y seguir agregando shows. No cierra nada.</div>`;

  showModal(`<div class="modal modal-lg">
    <div class="modal-t">${titulo}</div>
    <div class="modal-s">${cons.length} personas · ${jornadas.length} jornadas · ${fmt(totalG)} total</div>
    ${stN ? `<div class="alert alert-warn"><i class="ti ti-alert-triangle"></i> ${stN} persona${stN>1?'s tienen':' tiene'} jornadas sin tarifa.</div>` : ''}
    ${alertaInfo}
    <div style="max-height:360px;overflow-y:auto">
      ${cons.map(c => {
        const per = APP.personal.find(x => x.id === c.persona_id);
        return `<div class="qrow">
          <div class="qrow-h" onclick="const b=this.nextElementSibling;b.style.display=b.style.display==='none'?'block':'none'">
            <div>
              <div style="font-size:13px;font-weight:500">${per?.apellido||'?'}, ${per?.nombre||'?'}</div>
              <div style="font-size:11px;color:var(--text2)">CUIL ${per?.cuil||'—'} · ${c.lineas.length} jornada${c.lineas.length!==1?'s':''}</div>
            </div>
            <div style="display:flex;align-items:center;gap:9px">
              ${c.sin_tarifa ? '<span class="badge bw" style="font-size:10px">tarifas faltantes</span>' : ''}
              <span style="font-size:15px;font-weight:600">${fmt(c.total)}</span>
              <i class="ti ti-chevron-down" style="font-size:12px;color:var(--text2)"></i>
            </div>
          </div>
          <div class="qrow-b" style="display:none">
            ${c.lineas.map(l => `<div class="qrow-line">
              <span>${fd(l.fecha)} · ${l.ev_nombre}</span>
              <span>${l.posicion}</span>
              <span>${l.sin_tarifa ? '<span style="color:var(--orange)">sin tarifa</span>' : fmt(l.monto)}</span>
            </div>`).join('')}
            <div class="qrow-line" style="font-weight:600;color:var(--text)">
              <span>Subtotal persona</span><span></span><span>${fmt(c.total)}</span>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>
    <div class="modal-f">
      <button class="btn" onclick="closeModal()">Cerrar</button>
      <button class="btn" onclick="exportPreviewQuincena(${JSON.stringify(cons).replace(/"/g,'&quot;')}, '${q.nombre}')">
        <i class="ti ti-file-spreadsheet"></i> Exportar Excel
      </button>
      ${definitivo
        ? `<button class="btn btn-success" onclick="confirmarCierre('${qId}',${JSON.stringify(cons).replace(/"/g,'&quot;')})">
            <i class="ti ti-lock"></i> Confirmar cierre definitivo
           </button>`
        : `<button class="btn btn-primary" onclick="closeModal()">
            <i class="ti ti-check"></i> Listo, seguir trabajando
           </button>`
      }
    </div>
  </div>`);
};

window.handleFileCtx = async function(file, evId, fechaId, modo) {
  if (!file) return;
  if (APP.personal.length === 0) await fetchAll();
  const r = new FileReader();
  r.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, { type:'binary' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const mo = document.getElementById('mo'); if (mo) mo.style.display = 'none';
      parseDraft(XLSX.utils.sheet_to_json(ws, { header:1, defval:'' }), file.name, evId, fechaId, modo);
    } catch (err) { alert('Error leyendo el archivo: ' + err.message); }
  };
  r.readAsBinaryString(file);
};

// Mapea una sección/puesto de la planilla a la posición más cercana del tarifario.
// `area` (opcional) restringe la búsqueda solo a tarifas de esa área (o "General"), para evitar
// que se mezclen posiciones del mismo nombre entre áreas distintas (ej: "Orientador" de Ecoparque
// no debe aplicarse a un evento de Movistar Arena).
function mapToTarifario(secPlanilla, area) {
  if (!APP.tarifario.length) return secPlanilla;

  const universo = area ? APP.tarifario.filter(t => t.area === area || t.area === 'General') : APP.tarifario;
  if (!universo.length) return secPlanilla;

  const norm = s => s.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/es$/, '').replace(/s$/, '').trim();

  const needle = norm(secPlanilla);

  // Casos especiales antes del match general
  if (needle.includes('supervisor')) {
    const sup = universo.find(t => norm(t.posicion).includes('supervisor'));
    if (sup) return sup.posicion;
  }
  if (needle.includes('asistente') || needle.includes('franquero') || needle.includes('franquera')) {
    const fra = universo.find(t => norm(t.posicion).includes('franquero') || norm(t.posicion).includes('franquera'));
    if (fra) return fra.posicion;
  }
  if (needle.includes('boletero') || needle.includes('boletera')) {
    const bol = universo.find(t => norm(t.posicion).includes('boletero') || norm(t.posicion).includes('boletera'));
    if (bol) return bol.posicion;
  }

  // Buscar match directo en el tarifario
  const matches = universo.filter(t => {
    const hay = norm(t.posicion);
    const wordsNeedle = needle.split(/[\s\-]+/).filter(w => w.length > 2);
    const wordsHay    = hay.split(/[\s\-]+/).filter(w => w.length > 2);
    return wordsNeedle.some(w => hay.includes(w)) || wordsHay.some(w => needle.includes(w));
  });

  if (matches.length >= 1) return matches[0].posicion;

  // Si es una ubicación física → mapear a Orientador
  const ubicaciones = ['anillo','bowl','platea','calle','vip','corta','ticket','back','punto','point','ingreso','puerta','acceso','pasillo'];
  if (ubicaciones.some(u => needle.includes(u))) {
    // P.POINT / PUNTO DE POINT → Recepcion
    if (needle.includes('point') || needle.includes('punto')) {
      const recepcion = universo.find(t => norm(t.posicion).includes('recepcion') || norm(t.posicion).includes('recepción'));
      if (recepcion) return recepcion.posicion;
    }
    // BACKS → Orientador
    if (needle.includes('back')) {
      const orientador = universo.find(t => norm(t.posicion).includes('orientador'));
      if (orientador) return orientador.posicion;
    }
    // Resto de ubicaciones físicas → Orientador
    const orientador = universo.find(t => norm(t.posicion).includes('orientador'));
    if (orientador) return orientador.posicion;
  }

  return secPlanilla;
}

function parseDraft(rows, filename, evId, fechaId, modo) {
  const areaParaTarifa = modo === 'ext' ? 'Externos' : 'Movistar Arena';
  let hi=-1, cA=-1, cN=-1, cC=-1, cP=-1, cT=-1;
  for (let i = 0; i < Math.min(rows.length, 6); i++) {
    rows[i].forEach((v, j) => {
      const u = String(v).trim().toUpperCase();
      if (u === 'APELLIDO')                    { cA=j; hi=i; }
      if (u === 'NOMBRE')                        cN=j;
      if (u === 'CUIL')                          cC=j;
      if (u === 'PRESENTES' || u === 'PRESENTE') cP=j;
      if (u === 'TELEFONO'  || u === 'TELÉFONO') cT=j;
    });
    if (hi === i) break;
  }
  if (hi === -1) { alert('No encontré encabezados.\nVerificá: APELLIDO · NOMBRE · CUIL · PRESENTES'); return; }

  const filas = []; let sec = 'SIN SECCIÓN';
  for (let i = hi + 1; i < rows.length; i++) {
    const row = rows[i];
    const a0  = String(row[0]||'').trim();
    const b0  = String(row[cA]||'').trim();
    const b0u = b0.toUpperCase();

    // Fila de encabezado de sección: col A texto, col B = 'APELLIDO'
    if (a0 && b0u === 'APELLIDO') { sec = a0; continue; }

    // Saltar filas vacías o sin apellido
    if (!b0 || b0u === 'APELLIDO') continue;

    const nom  = String(row[cN]||'').trim();
    const cuil = String(row[cC]||'').replace(/\D/g, '');
    const pres = String(row[cP]||'').trim().toUpperCase() === 'P';
    const tel  = String(row[cT]||'').trim();

    // Formato 1: col A es número (fila normal de orientadores/staff)
    const num = parseFloat(a0);
    if (!isNaN(num) && num > 0) {
      // SIN SECCIÓN: filas antes del primer encabezado. Intentar mapear igual.
      const posSinSec = mapToTarifario(sec, areaParaTarifa);
      const posicion = (sec === 'SIN SECCIÓN' && posSinSec === 'SIN SECCIÓN' && APP.tarifario.length)
        ? (APP.tarifario.find(t => (t.area===areaParaTarifa||t.area==='General') && t.posicion.toLowerCase().includes('orientador'))?.posicion
           || APP.tarifario.find(t => t.area===areaParaTarifa||t.area==='General')?.posicion
           || APP.tarifario[0].posicion)
        : posSinSec;
      const ex = APP.personal.find(p => p.cuil && p.cuil === cuil)
              || (b0 ? APP.personal.find(p => p.apellido.toLowerCase() === b0.toLowerCase() && p.nombre.toLowerCase() === nom.toLowerCase()) : null);
      filas.push({ _id:uid(), posicion, posicionOriginal:sec, apellido:b0, nombre:nom, cuil, tel,
        presente:pres, existeId:ex?.id||null, esNuevo:!ex, sel:false });
      continue;
    }

    // Formato 2: col A es texto (supervisores con puesto en col A)
    if (a0 && a0.toUpperCase() !== 'APELLIDO' && b0 && cuil.length >= 8) {
      const subPuesto = a0; // ej: CALLE, VIP, BOWL, Coordinador
      const secCombinada = sec + ' - ' + subPuesto;
      // 1. Intentar match exacto del sub-puesto en el tarifario (ej: "Coordinador")
      const matchExacto = APP.tarifario.find(t =>
        (t.area===areaParaTarifa||t.area==='General') &&
        t.posicion.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim() ===
        subPuesto.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim()
      );
      // 2. Si no hay match exacto, usar la sección padre para mapear (ej: SUPERVISORES → Supervisor)
      const posicion = matchExacto
        ? matchExacto.posicion
        : mapToTarifario(sec, areaParaTarifa);
      const ex = APP.personal.find(p => p.cuil && p.cuil === cuil)
              || (b0 ? APP.personal.find(p => p.apellido.toLowerCase() === b0.toLowerCase() && p.nombre.toLowerCase() === nom.toLowerCase()) : null);
      filas.push({ _id:uid(), posicion, posicionOriginal:secCombinada, apellido:b0, nombre:nom, cuil, tel,
        presente:pres, existeId:ex?.id||null, esNuevo:!ex, sel:false });
    }
  }
  if (!filas.length) { alert('No encontré filas de personal.'); return; }

  const ev = evId ? getEvento(evId) : null;
  const f  = fechaId && ev ? (ev.fechas||[]).find(x => x.id === fechaId) : null;
  APP.draft = { filas, nombre:ev?.nombre||filename.replace(/\.[^/.]+$/,''), fecha:f?.fecha||'', area:modo==='ext'?'Externos':'Movistar Arena', evId, fechaId, modo };
  go('importar');
}

window.confirmarImport = async function() {
  const d        = APP.draft;
  const presentes = d.filas.filter(f => f.presente);

  // Resolver evId y fechaId — pueden venir pre-asignados (desde Arena/Externos)
  // o elegidos en los selectores de la pantalla de verificación
  let evId    = d.evId;
  let fechaId = d.fechaId;

  if (!evId) {
    const selShowVal = document.getElementById('sel-show')?.value;

    if (selShowVal) {
      // Usar la fecha del show seleccionado, no la del draft
      const showEv = APP.eventos.find(e => e.id === selShowVal);
      const fechaDate = showEv?.fecha || d.fecha || new Date().toISOString().slice(0, 10);
      loading(true);

      // Verificar si el show ya tiene una fecha creada para ese día
      const fechaExistente = (showEv?.fechas||[]).find(f => f.fecha === fechaDate && f.evento_id === selShowVal || f.fecha === fechaDate);
      if (fechaExistente && fechaExistente.evento_id === selShowVal) {
        evId    = selShowVal;
        fechaId = fechaExistente.id;
      } else {
        const { data: nf } = await sb.from('fechas').insert({
          evento_id: selShowVal, fecha: fechaDate, nombre: null
        }).select().single();
        evId    = selShowVal;
        fechaId = nf?.id;
      }
    } else {
      const continuar = confirm('No seleccionaste ningún show.\n¿Querés confirmar igual?\n(Se agregarán las personas nuevas pero sin vincular a ninguna quincena)');
      if (!continuar) { loading(false); return; }
    }
  }

  loading(true);

  // 1. Agregar personas nuevas
  for (const f of d.filas) {
    if (f.existeId) {
      // sin cambios de CBU en importación
    } else if (f.esNuevo && f.presente) {
      const { data: np } = await sb.from('personal').insert({
        nombre:f.nombre, apellido:f.apellido, cuil:f.cuil, tel:f.tel,
        area:d.area, posicion:f.posicion, activo:true
      }).select().single();
      f.existeId = np?.id;
    }
  }

  if (evId && fechaId) {
    // 2. Guardar presentismo — SIEMPRE borrar primero para evitar duplicados
    const { error: delError } = await sb.from('presentismo').delete().eq('fecha_id', fechaId);
    if (delError) console.error('Error borrando presentismo previo:', delError);
    
    await fetchAll();

    const presRows = [];
    for (const fp of presentes) {
      let persona = null;
      if (fp.existeId) {
        persona = APP.personal.find(x => x.id === fp.existeId);
      }
      if (!persona && fp.cuil) {
        persona = APP.personal.find(x => x.cuil && x.cuil.replace(/\D/g,'') === fp.cuil.replace(/\D/g,''));
      }
      if (!persona && fp.apellido) {
        persona = APP.personal.find(x =>
          x.apellido.toLowerCase() === fp.apellido.toLowerCase() &&
          x.nombre.toLowerCase() === fp.nombre.toLowerCase()
        );
      }
      if (persona) {
        presRows.push({ fecha_id: fechaId, persona_id: persona.id, posicion: fp.posicion });
      }
    }

    // Deduplicar por persona_id antes de insertar
    const presRowsUnicos = presRows.filter((r, i, arr) => 
      arr.findIndex(x => x.persona_id === r.persona_id) === i
    );

    if (presRowsUnicos.length) {
      const { error } = await sb.from('presentismo').insert(presRowsUnicos);
      if (error) {
        console.error('Error insertando presentismo:', error);
        toast('Error al guardar presentismo: ' + error.message, 'err');
      }
    } else {
      toast('No se encontraron personas para vincular', 'err');
    }
  }

  loading(false); APP.draft = null;
  const dest = d.area === 'Externos' ? 'externos' : 'arena';
  toast('Planilla importada correctamente', 'ok');
  await go(dest);
};

// Helper: construir filas de liquidación para export
// Helper: normalizar texto para export (sin tildes ni diéresis)
function normExport(s) {
  return String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

// Helper: nombre completo sin coma y sin tildes
function nombreExport(apellido, nombre) {
  return normExport(`${apellido} ${nombre}`);
}

function buildExportRows(liqs) {
  return liqs.map(l => {
    const p = APP.personal.find(x => x.id === l.persona_id);
    // nombre sin coma, sin tildes
    const nombre = p ? nombreExport(p.apellido, p.nombre) : normExport(l.persona_nombre||'');
    return {
      'Apellido y nombre': nombre,
      'CUIL':  p?.cuil  || '',
      'CBU':   p?.cbu   || '',
      'Área':  l.area   || '',
      'Evento / Quincena': l.quincena_nombre || l.evento_nombre || l.periodo || '',
      'Período': l.periodo || l.quincena_nombre || '',
      'Posición': l.posicion || '(múltiple)',
      'Jornadas': l.jornadas,
      'Valor jornada': l.valor_jornada || '',
      'Total ($)': l.total,
      'Estado': l.estado,
      'Fecha creación': l.created_at ? new Date(l.created_at).toLocaleDateString('es-AR') : '',
    };
  });
}

function exportXLSX(rows, filename) {
  const ws = XLSX.utils.json_to_sheet(rows);
  // Ancho de columnas
  ws['!cols'] = [22,16,26,22,14,28,18,14,10,14,14,12,14].map(w => ({ wch:w }));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Liquidaciones');
  XLSX.writeFile(wb, filename);
  toast('Excel exportado', 'ok');
}

window.handleCBUFile = function(file) {
  if (!file) return;
  const isCsv = file.name.endsWith('.csv') || file.name.endsWith('.txt');
  if (isCsv) {
    const r = new FileReader();
    r.onload = e => {
      const text = e.target.result.replace(/\uFEFF/g, '');
      const lines = text.split('\n').filter(l => l.trim());
      const rows = lines.map(l => {
        const sep = l.includes(';') ? ';' : ',';
        return l.split(sep).map(v => v.trim().replace(/\r/, '').replace(/^'/, ''));
      });
      parseCBU(rows);
    };
    r.readAsText(file, 'UTF-8');
  } else {
    const r = new FileReader();
    r.onload = e => {
      try {
        const wb = XLSX.read(e.target.result, { type:'binary', cellText:true, cellDates:false });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:'', raw:false });
        parseCBU(rows);
      } catch(err) { alert('Error leyendo el archivo: ' + err.message); }
    };
    r.readAsBinaryString(file);
  }
};

function parseCBU(rows) {
  let hi=-1, cCuil=-1, cCbu=-1;

  // Detectar encabezados buscando palabras clave — funciona con cualquier nombre de columna
  for (let i = 0; i < Math.min(rows.length, 4); i++) {
    rows[i].forEach((v, j) => {
      const u = String(v||'').toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
      if (u.includes('CUIL'))  { cCuil=j; hi=i; }
      if (u.includes('CBU'))   cCbu=j;
    });
    if (hi === i) break;
  }

  if (hi === -1 || cCuil === -1 || cCbu === -1) {
    alert('No encontré columnas CUIL y CBU.\nVerificá que el encabezado contenga esas palabras.');
    return;
  }

  const forzar = document.getElementById('forzar-cbu')?.checked;
  const resultados = [];

  for (let i = hi + 1; i < rows.length; i++) {
    const row = rows[i];
    // CUIL: limpiar — puede venir como número float (20461047921.0)
    let cuilRaw = String(row[cCuil]||'').trim();
    if (/e\+/i.test(cuilRaw)) {
      try { cuilRaw = BigInt(Math.round(parseFloat(cuilRaw))).toString(); } catch(e) { cuilRaw=''; }
    }
    const cuil = cuilRaw.replace(/\D/g,'').replace(/\.0$/, '');

    // CBU: limpiar espacios y guiones pero preservar dígitos
    let cbuRaw = String(row[cCbu]||'').trim();
    if (/e\+/i.test(cbuRaw)) {
      try { cbuRaw = BigInt(Math.round(parseFloat(cbuRaw))).toString(); } catch(e) { cbuRaw=''; }
    }
    const cbu = cbuRaw.replace(/[^0-9]/g,'');

    if (!cuil || cuil.length < 10 || !cbu || cbu.length < 20) continue;

    const persona = APP.personal.find(p => p.cuil && p.cuil.replace(/\D/g,'') === cuil);
    if (!persona) {
      resultados.push({ cuil, cbu, estado:'no_encontrado', nombre:'—' });
      continue;
    }
    if (persona.cbu && !forzar) {
      resultados.push({ cuil, cbu, estado:'ya_tiene', nombre:`${persona.apellido}, ${persona.nombre}`, id:persona.id });
      continue;
    }
    resultados.push({ cuil, cbu, estado:'actualizar', nombre:`${persona.apellido}, ${persona.nombre}`, id:persona.id });
  }

  const aActualizar = resultados.filter(r => r.estado === 'actualizar');
  const yaTiene     = resultados.filter(r => r.estado === 'ya_tiene');
  const noEncontrado = resultados.filter(r => r.estado === 'no_encontrado');

window.handlePlanillaFija = function(file, mesId, lugarId) {
  if (!file) return;
  const esPdf = file.name.toLowerCase().endsWith('.pdf');
  if (esPdf) {
    const r = new FileReader();
    r.onload = async e => {
      try {
        closeModal();
        loading(true);
        const rows = await extraerFilasPDF(e.target.result);
        loading(false);
        parsePlanillaFijaPDF(rows, mesId, lugarId);
      } catch(err) { loading(false); alert('Error leyendo el PDF: ' + err.message); }
    };
    r.readAsArrayBuffer(file);
    return;
  }
  const r = new FileReader();
  r.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, { type: 'binary', cellDates: true });
      // Para Campo de Polo usar hoja LIQUIDACION si existe, sino la primera
      const sheetName = wb.SheetNames.find(n => n.toUpperCase().includes('LIQUIDACION')) || wb.SheetNames[0];
      const ws = wb.Sheets[sheetName];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null, raw: true });
      closeModal();
      parsePlanillaFija(rows, mesId, lugarId);
    } catch(err) { alert('Error leyendo el archivo: ' + err.message); }
  };
  r.readAsBinaryString(file);
};

// ── EXTRACCIÓN DE TEXTO DE PDF (Teatro Colón) ──
// Usa pdf.js para extraer palabras con posición X/Y y reconstruye filas agrupando por Y.
async function extraerFilasPDF(arrayBuffer) {
  if (typeof pdfjsLib === 'undefined') throw new Error('No se pudo cargar el lector de PDF.');
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  const allRows = [];
  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const content = await page.getTextContent();
    // Agrupar items por posición Y (misma fila si están a menos de 3px de diferencia)
    const items = content.items.map(it => ({ text: it.str, x: it.transform[4], y: Math.round(it.transform[5]) }));
    const byY = {};
    items.forEach(it => {
      if (!it.text.trim()) return;
      const yKey = Object.keys(byY).find(k => Math.abs(parseFloat(k) - it.y) <= 3) || it.y;
      if (!byY[yKey]) byY[yKey] = [];
      byY[yKey].push(it);
    });
    // Ordenar filas de arriba a abajo (Y descendente en coords PDF), y dentro de cada fila por X
    const ys = Object.keys(byY).map(parseFloat).sort((a,b) => b - a);
    ys.forEach(y => {
      const row = byY[y].sort((a,b) => a.x - b.x);
      allRows.push(row);
    });
  }
  return allRows;
}

// Parsea filas extraídas del PDF de Teatro Colón.
// Estructura esperada por fila: Nº, Apellido, Nombre, CUIL, luego una celda 'P' por cada día presente.
// Solo se extrae el TOTAL de jornadas por persona — el desglose entre jornada de 6hs (Fábrica / Teatro
// lun-sáb) y jornada de 8hs (Teatro domingo) no está estructurado en el PDF (va en comentarios sueltos),
// así que se ajusta manualmente en la pantalla de verificación.
function parsePlanillaFijaPDF_Colon(pdfRows, mesId, lugarId) {
  // 1. Encontrar la fila de encabezado con las fechas (contiene "1/6","2/6", etc), solo para ubicar dónde
  // empiezan los datos — ya no se usa para clasificar día de semana.
  let headerIdx = -1;
  for (let i = 0; i < pdfRows.length; i++) {
    const fechasEnFila = pdfRows[i].filter(it => /^\d{1,2}\/\d{1,2}$/.test(it.text.trim()));
    if (fechasEnFila.length >= 10) { headerIdx = i; break; }
  }
  if (headerIdx === -1) { alert('No encontré las fechas en el PDF. Verificá el formato de la planilla.'); return; }

  // 2. Procesar filas de datos: las que tienen un CUIL (11 dígitos) en alguna celda
  const personas = [];
  for (let i = headerIdx + 1; i < pdfRows.length; i++) {
    const row = pdfRows[i];
    const cuilItem = row.find(it => /^\d{11}$/.test(it.text.replace(/\D/g,'')) && it.text.replace(/\D/g,'').length === 11);
    if (!cuilItem) continue;
    const cuil = cuilItem.text.replace(/\D/g,'');
    const cuilIdx = row.indexOf(cuilItem);

    // Apellido y nombre: las celdas de texto antes del CUIL (excluyendo el número de orden inicial)
    const textCells = row.slice(0, cuilIdx).filter(it => isNaN(parseFloat(it.text)) && it.text.trim());
    const apellido = textCells[0]?.text.trim() || '';
    const nombre = textCells.slice(1).map(it => it.text.trim()).join(' ');

    // Celdas de marca de presencia (después del CUIL) — se cuenta el total de "P", sin clasificar por fecha
    const marcas = row.slice(cuilIdx + 1);
    let jornadas = 0;
    marcas.forEach(it => {
      const txt = it.text.trim().toUpperCase();
      if (txt.startsWith('P')) jornadas++; // ignora notas tipo "[1]" sueltas, '-' etc.
    });
    const jornadasFinde = 0; // arranca en 0: se ajusta manualmente según Fábrica/Teatro lun-sáb vs Teatro domingo

    if (!apellido) continue;

    const per = APP.personal.find(p =>
      (cuil && p.cuil && p.cuil.replace(/\D/g,'') === cuil) ||
      (p.apellido.toLowerCase() === apellido.toLowerCase())
    );

    personas.push({
      _id: uid(), apellido, nombre, cuil, posicion: per?.posicion || '',
      jornadas, jornadasFinde, existeId: per?.id || null, esNuevo: !per
    });
  }

  if (!personas.length) { alert('No encontré personas con CUIL válido en el PDF.'); return; }
  mostrarVerificacionFija(personas, mesId, lugarId);
}

// Parsea filas extraídas del PDF de Ecoparque o Campo de Polo (sin CUIL en la planilla).
// Estructura esperada por fila: Nº, Apellido, Nombre, Posición/Función, luego una celda 'P' (o "P (nota)")
// por cada día presente. No hay tarifa diferencial de jornada en estos lugares.
// El match con personal existente se hace por apellido + nombre, ya que no hay CUIL disponible.
function parsePlanillaFijaPDF_SinCuil(pdfRows, mesId, lugarId) {
  const areaLugar = LUGARES_FIJOS.find(l => l.id === lugarId)?.nombre;
  const posicionesValidas = APP.tarifario.filter(t => t.area === areaLugar || t.area === 'General').map(t => t.posicion);

  // 1. Encontrar la fila de encabezado con las fechas (contiene "1/6","4/6", etc)
  let headerIdx = -1;
  for (let i = 0; i < pdfRows.length; i++) {
    const fechasEnFila = pdfRows[i].filter(it => /^\d{1,2}\/\d{1,2}$/.test(it.text.trim()));
    if (fechasEnFila.length >= 5) { headerIdx = i; break; }
  }
  if (headerIdx === -1) { alert('No encontré las fechas en el PDF. Verificá el formato de la planilla.'); return; }

  // 2. Procesar filas de datos: empiezan con un número de orden, seguido de Apellido, Nombre, Posición
  const personas = [];
  for (let i = headerIdx + 1; i < pdfRows.length; i++) {
    const row = pdfRows[i];
    if (!row.length) continue;
    const primero = row[0]?.text.trim();
    // La fila de datos arranca con un número de orden (1, 2, 3...)
    if (!/^\d+$/.test(primero)) continue;

    // Buscar dónde termina el bloque de texto (apellido+nombre+posición) y empiezan las marcas P/A/-
    // Las marcas son celdas que son exactamente P, A, -, o empiezan con "P" (ej: "P (una hora tarde)")
    const esMarca = (txt) => {
      const t = txt.trim().toUpperCase();
      return t === 'P' || t === 'A' || t === '-' || t.startsWith('P ') || t.startsWith('P(');
    };
    let primeraMarcaIdx = row.findIndex((it, idx) => idx > 0 && esMarca(it.text));
    if (primeraMarcaIdx === -1) primeraMarcaIdx = row.length; // sin marcas, fila como Macias

    // Las celdas de texto entre el número de orden y la primera marca: apellido, nombre, posición
    const textCells = row.slice(1, primeraMarcaIdx).map(it => it.text.trim()).filter(Boolean);
    // La última celda de texto suele ser la posición/función si coincide con el tarifario; si no, se asume
    // que las últimas palabras son "Nombre Posición" pegado — pero en este formato vienen como celdas
    // separadas, así que buscamos cuál de las celdas matchea una posición conocida del tarifario.
    let posicionDetectada = '';
    let idxPosicion = textCells.length;
    for (let k = textCells.length - 1; k >= 0; k--) {
      if (posicionesValidas.some(pv => textCells[k].toLowerCase().includes(pv.toLowerCase()) || pv.toLowerCase().includes(textCells[k].toLowerCase()))) {
        posicionDetectada = posicionesValidas.find(pv => textCells[k].toLowerCase().includes(pv.toLowerCase()) || pv.toLowerCase().includes(textCells[k].toLowerCase()));
        idxPosicion = k;
        break;
      }
    }
    const nombreCompleto = textCells.slice(0, idxPosicion);
    const apellido = nombreCompleto[0] || '';
    const nombre = nombreCompleto.slice(1).join(' ');

    if (!apellido) continue;

    // Contar jornadas: cualquier marca que empiece con "P" (incluye "P (una hora tarde)")
    const marcas = row.slice(primeraMarcaIdx);
    let jornadas = 0;
    marcas.forEach(it => {
      const txt = it.text.trim().toUpperCase();
      if (txt.startsWith('P')) jornadas++;
    });

    const per = APP.personal.find(p =>
      p.apellido.toLowerCase() === apellido.toLowerCase() &&
      (!nombre || !p.nombre || p.nombre.toLowerCase().split(' ')[0] === nombre.toLowerCase().split(' ')[0])
    );

    personas.push({
      _id: uid(), apellido, nombre, cuil: '', posicion: posicionDetectada || per?.posicion || '',
      jornadas, jornadasFinde: 0, existeId: per?.id || null, esNuevo: !per
    });
  }

  if (!personas.length) { alert('No encontré personas en el PDF. Verificá el formato de la planilla.'); return; }
  mostrarVerificacionFija(personas, mesId, lugarId);
}

// Parsea filas extraídas del PDF de Campo de Polo. Formato: Apellido y Nombre, CUIL (11 dígitos),
// FUNCION, y luego una celda con monto en pesos (ej: "$32,614") por cada jornada presente.
// No usa "P" como marca — la presencia se indica con el monto de esa jornada.
function parsePlanillaFijaPDF_Polo(pdfRows, mesId, lugarId) {
  const personas = [];
  for (let i = 0; i < pdfRows.length; i++) {
    const row = pdfRows[i];
    const cuilItem = row.find(it => /^\d{11}$/.test(it.text.replace(/\D/g,'')) && it.text.replace(/\D/g,'').length === 11);
    if (!cuilItem) continue; // las filas de datos en este formato siempre tienen CUIL
    const cuil = cuilItem.text.replace(/\D/g,'');
    const cuilIdx = row.indexOf(cuilItem);

    // Antes del CUIL: "Apellido Nombre" en una sola celda de texto
    const apellidoNombre = (row[cuilIdx - 1]?.text || '').trim();
    const partes = apellidoNombre.split(/\s+/);
    const apellido = partes[0] || '';
    const nombre = partes.slice(1).join(' ');
    if (!apellido) continue;

    // Después del CUIL: la celda de FUNCION (texto), luego las marcas de monto ($X,XXX) por jornada
    const funcion = (row[cuilIdx + 1]?.text || '').trim();

    // Contar jornadas: cualquier celda con formato de monto en pesos ($N,NNN o similar)
    const marcas = row.slice(cuilIdx + 2);
    let jornadas = 0;
    marcas.forEach(it => {
      const txt = it.text.trim();
      if (/^\$[\d.,]+$/.test(txt)) jornadas++;
    });

    const per = APP.personal.find(p =>
      (p.cuil && p.cuil.replace(/\D/g,'') === cuil) ||
      p.apellido.toLowerCase() === apellido.toLowerCase()
    );

    personas.push({
      _id: uid(), apellido, nombre, cuil, posicion: per?.posicion || '',
      jornadas, jornadasFinde: 0, existeId: per?.id || null, esNuevo: !per
    });
  }

  if (!personas.length) { alert('No encontré personas con CUIL válido en el PDF.'); return; }
  mostrarVerificacionFija(personas, mesId, lugarId);
}

// Router: decide qué parser de PDF usar según el lugar
function parsePlanillaFijaPDF(pdfRows, mesId, lugarId) {
  if (lugarId === 'teatro-colon') return parsePlanillaFijaPDF_Colon(pdfRows, mesId, lugarId);
  if (lugarId === 'campo-de-polo') return parsePlanillaFijaPDF_Polo(pdfRows, mesId, lugarId);
  return parsePlanillaFijaPDF_SinCuil(pdfRows, mesId, lugarId);
}

function parsePlanillaFija(rows, mesId, lugarId) {
  const areaLugar = LUGARES_FIJOS.find(l => l.id === lugarId)?.nombre;
  let hi = -1, cB = -1, cN = -1, cC = -1, cPos = -1, cFechaStart = -1;
  let nombreJunto = false;

  for (let i = 0; i < Math.min(rows.length, 5); i++) {
    const row = rows[i];
    if (!row) continue;
    for (let j = 0; j < row.length; j++) {
      const v = String(row[j]||'').trim().toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
      if (v === 'APELLIDO') { cB = j; hi = i; }
      if (v === 'APELLIDO Y NOMBRE') { cB = j; hi = i; nombreJunto = true; }
      if (v === 'NOMBRE') cN = j;
      if (v.includes('CUIL')) cC = j;
      if (v === 'FUNCION' || v === 'FUNCION' || v.includes('POSICION')) cPos = j;
    }
    if (hi === i) break;
  }

  if (hi === -1) { alert('No encontré el encabezado. Verificá que la planilla tenga columna APELLIDO o APELLIDO Y NOMBRE.'); return; }

  const headerRow = rows[hi];
  for (let j = Math.max(cC||0, cPos||0, cN||0, cB||0) + 1; j < (headerRow||[]).length; j++) {
    const v = headerRow[j];
    if (v instanceof Date) { cFechaStart = j; break; }
    const vs = String(v||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    if (['lunes','martes','miercoles','jueves','viernes','sabado','domingo'].includes(vs)) {
      cFechaStart = j; break;
    }
  }
  if (cFechaStart === -1) cFechaStart = Math.max(cC||0, cPos||0, cN||0, cB||0) + 1;

  // Detectar columna TOTAL para excluirla del conteo de jornadas
  let cTotal = -1;
  if (headerRow) {
    for (let j = cFechaStart; j < headerRow.length; j++) {
      const v = String(headerRow[j]||"").toUpperCase().trim();
      if (v === "TOTAL" || v === "TOTAL DIAS" || v === "TOTAL JORNADAS") { cTotal = j; break; }
    }
  }

  // Detectar columnas de fin de semana (sábado=6, domingo=0) usando fechas reales si están disponibles
  // Busca una fila con valores Date entre hi y hi+2 para usar como referencia de día de semana
  const finde = {}; // { colIndex: true } si esa columna es sábado o domingo
  for (let r = hi; r <= Math.min(hi + 2, rows.length - 1); r++) {
    const fr = rows[r];
    if (!fr) continue;
    let foundDate = false;
    for (let j = cFechaStart; j < (cTotal !== -1 ? cTotal : fr.length); j++) {
      if (fr[j] instanceof Date) {
        const dow = fr[j].getDay(); // 0=domingo, 6=sabado
        if (dow === 0 || dow === 6) finde[j] = true;
        foundDate = true;
      }
    }
    if (foundDate) break;
  }
  // Fallback: si no hay fechas reales, usar letras de día en el header (S=sabado, D=domingo)
  if (Object.keys(finde).length === 0 && headerRow) {
    for (let j = cFechaStart; j < (cTotal !== -1 ? cTotal : headerRow.length); j++) {
      const v = String(headerRow[j]||'').trim().toUpperCase();
      if (v === 'S' || v === 'D' || v === 'SAB' || v === 'DOM') finde[j] = true;
    }
  }

  // Para Campo de Polo, los datos empiezan en hi+2 (saltando la fila de fechas)
  // Para Ecoparque, los datos empiezan en hi+1
  let dataStart = hi + 1;
  // Detectar si la fila hi+1 es una fila de fechas (tiene Date en la posición de fechas)
  const nextRow = rows[hi + 1];
  if (nextRow && cFechaStart >= 0 && nextRow[cFechaStart] instanceof Date) {
    dataStart = hi + 2;
  }

  // Si no detectó CUIL por encabezado, intentar col C (índice 2) — Campo de Polo
  if (cC === -1) {
    for (let i = dataStart; i < Math.min(rows.length, dataStart + 3); i++) {
      const testVal = rows[i] ? String(rows[i][2]||'').replace('.0','').replace(/\D/g,'') : '';
      if (testVal.length >= 10) { cC = 2; break; }
    }
  }

  const personas = [];
  for (let i = dataStart; i < rows.length; i++) {
    const row = rows[i];
    if (!row || row[cB] === null || row[cB] === undefined || row[cB] === '') continue;
    const apellidoNombre = String(row[cB]||'').trim();
    if (!apellidoNombre) continue;

    // Cortar si encontramos un encabezado secundario (segunda seccion de la planilla)
    const apellidoUp = apellidoNombre.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
    if (apellidoUp === "NOMBRE" || apellidoUp === "APELLIDO" || apellidoUp === "APELLIDO Y NOMBRE") break;
    const col0 = String(row[0]||"").toUpperCase().trim();
    if (col0 === "PUESTO") break;

    let apellido = apellidoNombre, nombre = '';
    if (nombreJunto) {
      const partes = apellidoNombre.split(' ');
      apellido = partes[0];
      nombre = partes.slice(1).join(' ');
    } else {
      nombre = cN >= 0 ? String(row[cN]||'').trim() : '';
    }

    let posicion = '';
    if (cPos >= 0) posicion = String(row[cPos]||'').trim();
    else if (row[3] && typeof row[3] === 'string' && !/^\d+$/.test(row[3].trim())) posicion = String(row[3]).trim();

    let cuil = '';
    if (cC >= 0) cuil = String(row[cC]||'').replace(/\.0$/, '').replace(/\D/g, '');

    let jornadas = 0, jornadasFinde = 0;
    const jEnd = cTotal !== -1 ? cTotal : row.length;
    for (let j = cFechaStart; j < jEnd; j++) {
      const v = row[j];
      if (v === null || v === undefined || v === '') continue;
      const str = String(v).trim().toUpperCase();
      // Solo Teatro Colón separa jornadas de semana/finde (tarifa diferencial). Los demás lugares
      // (Ecoparque, Campo de Polo) cuentan todo como una sola jornada, sin distinción de día.
      const esFinde = lugarId === 'teatro-colon' && !!finde[j];
      if (str === 'P') { if (esFinde) jornadasFinde++; else jornadas++; continue; }
      if (str === '-' || str === 'A') continue;
      const num = parseFloat(String(v).replace(',', '.'));
      if (!isNaN(num) && num > 0) { if (esFinde) jornadasFinde++; else jornadas++; }
    }

    if (!apellido) continue;

    const posicionMapeada = posicion ? mapToTarifario(posicion, areaLugar) : '';
    const per = APP.personal.find(p =>
      (cuil && p.cuil && p.cuil.replace(/\D/g,'') === cuil) ||
      (p.apellido.toLowerCase() === apellido.toLowerCase() && (!nombre || p.nombre.toLowerCase().startsWith(nombre.toLowerCase().split(' ')[0].toLowerCase())))
    );

    personas.push({
      _id: uid(), apellido, nombre, cuil, posicion: posicionMapeada || posicion,
      jornadas, jornadasFinde, existeId: per?.id || null, esNuevo: !per
    });
  }

  if (!personas.length) { alert('No encontré personas en la planilla.'); return; }
  mostrarVerificacionFija(personas, mesId, lugarId);
}

function mostrarVerificacionFija(personas, mesId, lugarId) {

    <div class="alert alert-info" style="padding:8px 12px"><i class="ti ti-eye"></i>
      Verificá las jornadas y posiciones antes de confirmar. <strong>${mes.nombre} — ${lugar.nombre}</strong>

    ${personas.filter(p=>p.esNuevo).length ? `<div class="alert alert-warn"><i class="ti ti-user-plus"></i> ${personas.filter(p=>p.esNuevo).length} personas nuevas se agregarán al sistema.</div>` : ''}
    <div class="card" style="padding:0;overflow:hidden">
      <table><thead><tr>
        <th>Apellido y nombre</th><th>CUIL</th><th>Posición</th>
        <th style="text-align:center">Jornadas 6 hs.</th>${lugarId==='teatro-colon'?'<th style="text-align:center">Jornadas 8 hs.</th>':''}<th style="text-align:right">Subtotal</th><th>Estado</th>
      </tr></thead>
      <tbody>${personas.map(p => {
        // Las opciones de posición se filtran siempre por el área del lugar (Ecoparque/Colón/Polo),
        // nunca se muestra el tarifario completo de otras áreas.
        const areaLugarVer = LUGARES_FIJOS.find(l => l.id === lugarId)?.nombre;
        const posicionesBase = lugarId === 'teatro-colon'
          ? [...new Set(APP.tarifario
              .filter(t => t.area === 'Teatro Colón')
              .map(t => t.posicion.replace(/\s*\[Jornada [68] hs\.\]\s*$/i, '')))]
          : [...new Set(APP.tarifario.filter(t => t.area === areaLugarVer || t.area === 'General').map(t => t.posicion))];
        // Si la persona no tiene posición asignada (nueva), usar la primera disponible como default
        const posicionEfectiva = p.posicion || posicionesBase[0] || '';
        const subtotal = calcSubtotalFijo(posicionEfectiva, p.jornadas, p.jornadasFinde||0);
        const allPosOpts = posicionesBase.map(pb => `<option value="${pb}" ${pb===posicionEfectiva?'selected':''}>${pb}</option>`).join('');
        return `<tr id="pfrow-${p._id}">
          <td><strong>${p.apellido}, ${p.nombre}</strong></td>
          <td style="font-family:monospace;font-size:11.5px">${p.cuil||'—'}</td>
          <td><select id="pfpos-${p._id}" onchange="calcFilaFijaVer('${p._id}','${lugarId}')" style="font-size:12px;padding:3px 6px">${allPosOpts}</select></td>
          <td style="text-align:center"><input type="number" id="pfjor-${p._id}" value="${p.jornadas}" min="0" max="31" oninput="calcFilaFijaVer('${p._id}','${lugarId}')" style="width:60px;text-align:center"></td>
          ${lugarId==='teatro-colon'?`<td style="text-align:center"><input type="number" id="pfjorf-${p._id}" value="${p.jornadasFinde||0}" min="0" max="31" oninput="calcFilaFijaVer('${p._id}','${lugarId}')" style="width:60px;text-align:center"></td>`:''}
          <td style="text-align:right;font-weight:500" id="pfsub-${p._id}">${fmt(subtotal)}</td>
          <td>${p.esNuevo ? '<span class="badge bn" style="font-size:10px">nuevo</span>' : '<span class="badge bs" style="font-size:10px">registrado</span>'}</td>
        </tr>`;
      }).join('')}</tbody>
      <tfoot><tr>
        <td colspan="${lugarId==='teatro-colon'?5:4}" style="font-weight:600;padding:10px;border-top:2px solid var(--border)">Total estimado</td>
        <td style="text-align:right;font-size:16px;font-weight:700;padding:10px;border-top:2px solid var(--border)" id="pf-total">
          ${fmt(personas.reduce((s,p) => {
            const areaLugarVer2 = LUGARES_FIJOS.find(l => l.id === lugarId)?.nombre;
            const posicionesBase2 = lugarId === 'teatro-colon'
              ? [...new Set(APP.tarifario.filter(t => t.area === 'Teatro Colón').map(t => t.posicion.replace(/\s*\[Jornada [68] hs\.\]\s*$/i, '')))]
              : [...new Set(APP.tarifario.filter(t => t.area === areaLugarVer2 || t.area === 'General').map(t => t.posicion))];
            const posEf = p.posicion || posicionesBase2[0] || '';
            return s+calcSubtotalFijo(posEf, p.jornadas, p.jornadasFinde||0);
          }, 0))}
        </td>
        <td style="border-top:2px solid var(--border)"></td>
      </tr></tfoot>
      </table>
    </div>`;

  // Guardar draft en window
  window._fijoDraft = { personas, mesId, lugarId };
}

window.calcFilaFijaVer = function(id, lugarId) {
  const jornadas = parseInt(document.getElementById('pfjor-'+id)?.value) || 0;
  const jornadasFinde = lugarId==='teatro-colon' ? (parseInt(document.getElementById('pfjorf-'+id)?.value) || 0) : 0;
  const posicion  = document.getElementById('pfpos-'+id)?.value;
  const sub = calcSubtotalFijo(posicion, jornadas, jornadasFinde);
  const subEl = document.getElementById('pfsub-'+id); if (subEl) subEl.textContent = fmt(sub);
  // Recalcular total
  let total = 0;
  document.querySelectorAll('[id^="pfsub-"]').forEach(el => {
    const n = parseFloat(el.textContent.replace(/[^0-9]/g,'')) || 0; total += n;
  });
  const totEl = document.getElementById('pf-total'); if (totEl) totEl.textContent = fmt(total);
};

window.confirmarPlanillaFija = async function(mesId, lugarId) {
  const draft = window._fijoDraft;
  if (!draft) return;
  loading(true);

  const meses = getMesesFijos();
  const mes = meses.find(m => m.id === mesId);
  if (!mes.presentes) mes.presentes = {};

  const presentesLugar = [];
  for (const p of draft.personas) {
    const jornadas = parseInt(document.getElementById('pfjor-'+p._id)?.value) || 0;
    const jornadasFinde = lugarId==='teatro-colon' ? (parseInt(document.getElementById('pfjorf-'+p._id)?.value) || 0) : 0;
    const posicion  = document.getElementById('pfpos-'+p._id)?.value;

    // Agregar persona nueva si no existe
    if (p.esNuevo) {
      const { data: np } = await sb.from('personal').insert({
        nombre: p.nombre, apellido: p.apellido, cuil: p.cuil,
        area: 'Servicios Fijos', lugar_fijo: lugarId, posicion, activo: true
      }).select().single();
      p.existeId = np?.id;
    }

    presentesLugar.push({ personaId: p.existeId, apellido: p.apellido, nombre: p.nombre, cuil: p.cuil, posicion, jornadas, jornadasFinde });
  }

  mes.presentes[lugarId] = presentesLugar;
  saveMesesFijos(meses);
  loading(false);
  window._fijoDraft = null;
  toast('Planilla importada', 'ok');
  await go('fijos');
};
