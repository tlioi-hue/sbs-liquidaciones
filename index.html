window.handlePlanillaFija = function(file, mesId, lugarId) {
  if (!file) return;
  const esPdf = file.name.toLowerCase().endsWith('.pdf');
  if (esPdf) {
    const r = new FileReader();
    r.onload = async e => {
      try {
        closeModal();
        loading(true);
        const rows = await extraerFilasPDF(e.target.result);
        loading(false);
        parsePlanillaFijaPDF(rows, mesId, lugarId);
      } catch(err) { loading(false); alert('Error leyendo el PDF: ' + err.message); }
    };
    r.readAsArrayBuffer(file);
    return;
  }
  const r = new FileReader();
  r.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, { type: 'binary', cellDates: true });
      // Para Campo de Polo usar hoja LIQUIDACION si existe, sino la primera
      const sheetName = wb.SheetNames.find(n => n.toUpperCase().includes('LIQUIDACION')) || wb.SheetNames[0];
      const ws = wb.Sheets[sheetName];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null, raw: true });
      closeModal();
      parsePlanillaFija(rows, mesId, lugarId);
    } catch(err) { alert('Error leyendo el archivo: ' + err.message); }
  };
  r.readAsBinaryString(file);
};

// ── EXTRACCIÓN DE TEXTO DE PDF (Teatro Colón) ──
// Usa pdf.js para extraer palabras con posición X/Y y reconstruye filas agrupando por Y.
async function extraerFilasPDF(arrayBuffer) {
  if (typeof pdfjsLib === 'undefined') throw new Error('No se pudo cargar el lector de PDF.');
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  const allRows = [];
  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const content = await page.getTextContent();
    // Agrupar items por posición Y (misma fila si están a menos de 3px de diferencia)
    const items = content.items.map(it => ({ text: it.str, x: it.transform[4], y: Math.round(it.transform[5]) }));
    const byY = {};
    items.forEach(it => {
      if (!it.text.trim()) return;
      const yKey = Object.keys(byY).find(k => Math.abs(parseFloat(k) - it.y) <= 3) || it.y;
      if (!byY[yKey]) byY[yKey] = [];
      byY[yKey].push(it);
    });
    // Ordenar filas de arriba a abajo (Y descendente en coords PDF), y dentro de cada fila por X
    const ys = Object.keys(byY).map(parseFloat).sort((a,b) => b - a);
    ys.forEach(y => {
      const row = byY[y].sort((a,b) => a.x - b.x);
      allRows.push(row);
    });
  }
  return allRows;
}

// Parsea filas extraídas del PDF de Teatro Colón.
// Estructura esperada por fila: Nº, Apellido, Nombre, CUIL, luego una celda 'P' por cada día presente.
// Solo se extrae el TOTAL de jornadas por persona — el desglose entre jornada de 6hs (Fábrica / Teatro
// lun-sáb) y jornada de 8hs (Teatro domingo) no está estructurado en el PDF (va en comentarios sueltos),
// así que se ajusta manualmente en la pantalla de verificación.
function parsePlanillaFijaPDF_Colon(pdfRows, mesId, lugarId) {
  // 1. Encontrar la fila de encabezado con las fechas (contiene "1/6","2/6", etc), solo para ubicar dónde
  // empiezan los datos — ya no se usa para clasificar día de semana.
  let headerIdx = -1;
  for (let i = 0; i < pdfRows.length; i++) {
    const fechasEnFila = pdfRows[i].filter(it => /^\d{1,2}\/\d{1,2}$/.test(it.text.trim()));
    if (fechasEnFila.length >= 10) { headerIdx = i; break; }
  }
  if (headerIdx === -1) { alert('No encontré las fechas en el PDF. Verificá el formato de la planilla.'); return; }

  // 2. Procesar filas de datos: las que tienen un CUIL (11 dígitos) en alguna celda
  const personas = [];
  for (let i = headerIdx + 1; i < pdfRows.length; i++) {
    const row = pdfRows[i];
    const cuilItem = row.find(it => /^\d{11}$/.test(it.text.replace(/\D/g,'')) && it.text.replace(/\D/g,'').length === 11);
    if (!cuilItem) continue;
    const cuil = cuilItem.text.replace(/\D/g,'');
    const cuilIdx = row.indexOf(cuilItem);

    // Apellido y nombre: las celdas de texto antes del CUIL (excluyendo el número de orden inicial)
    const textCells = row.slice(0, cuilIdx).filter(it => isNaN(parseFloat(it.text)) && it.text.trim());
    const apellido = textCells[0]?.text.trim() || '';
    const nombre = textCells.slice(1).map(it => it.text.trim()).join(' ');

    // Celdas de marca de presencia (después del CUIL) — se cuenta el total de "P", sin clasificar por fecha
    const marcas = row.slice(cuilIdx + 1);
    let jornadas = 0;
    marcas.forEach(it => {
      const txt = it.text.trim().toUpperCase();
      if (txt.startsWith('P')) jornadas++; // ignora notas tipo "[1]" sueltas, '-' etc.
    });
    const jornadasFinde = 0; // arranca en 0: se ajusta manualmente según Fábrica/Teatro lun-sáb vs Teatro domingo

    if (!apellido) continue;

    const per = APP.personal.find(p =>
      (cuil && p.cuil && p.cuil.replace(/\D/g,'') === cuil) ||
      (p.apellido.toLowerCase() === apellido.toLowerCase())
    );

    personas.push({
      _id: uid(), apellido, nombre, cuil, posicion: per?.posicion || '',
      jornadas, jornadasFinde, existeId: per?.id || null, esNuevo: !per
    });
  }

  if (!personas.length) { alert('No encontré personas con CUIL válido en el PDF.'); return; }
  mostrarVerificacionFija(personas, mesId, lugarId);
}

// Parsea filas extraídas del PDF de Ecoparque o Campo de Polo (sin CUIL en la planilla).
// Estructura esperada por fila: Nº, Apellido, Nombre, Posición/Función, luego una celda 'P' (o "P (nota)")
// por cada día presente. No hay tarifa diferencial de jornada en estos lugares.
// El match con personal existente se hace por apellido + nombre, ya que no hay CUIL disponible.
function parsePlanillaFijaPDF_SinCuil(pdfRows, mesId, lugarId) {
  const areaLugar = LUGARES_FIJOS.find(l => l.id === lugarId)?.nombre;
  const posicionesValidas = APP.tarifario.filter(t => t.area === areaLugar || t.area === 'General').map(t => t.posicion);

  // 1. Encontrar la fila de encabezado con las fechas (contiene "1/6","4/6", etc)
  let headerIdx = -1;
  for (let i = 0; i < pdfRows.length; i++) {
    const fechasEnFila = pdfRows[i].filter(it => /^\d{1,2}\/\d{1,2}$/.test(it.text.trim()));
    if (fechasEnFila.length >= 5) { headerIdx = i; break; }
  }
  if (headerIdx === -1) { alert('No encontré las fechas en el PDF. Verificá el formato de la planilla.'); return; }

  // 2. Procesar filas de datos: empiezan con un número de orden, seguido de Apellido, Nombre, Posición
  const personas = [];
  for (let i = headerIdx + 1; i < pdfRows.length; i++) {
    const row = pdfRows[i];
    if (!row.length) continue;
    const primero = row[0]?.text.trim();
    // La fila de datos arranca con un número de orden (1, 2, 3...)
    if (!/^\d+$/.test(primero)) continue;

    // Buscar dónde termina el bloque de texto (apellido+nombre+posición) y empiezan las marcas P/A/-
    // Las marcas son celdas que son exactamente P, A, -, o empiezan con "P" (ej: "P (una hora tarde)")
    const esMarca = (txt) => {
      const t = txt.trim().toUpperCase();
      return t === 'P' || t === 'A' || t === '-' || t.startsWith('P ') || t.startsWith('P(');
    };
    let primeraMarcaIdx = row.findIndex((it, idx) => idx > 0 && esMarca(it.text));
    if (primeraMarcaIdx === -1) primeraMarcaIdx = row.length; // sin marcas, fila como Macias

    // Las celdas de texto entre el número de orden y la primera marca: apellido, nombre, posición
    const textCells = row.slice(1, primeraMarcaIdx).map(it => it.text.trim()).filter(Boolean);
    // La última celda de texto suele ser la posición/función si coincide con el tarifario; si no, se asume
    // que las últimas palabras son "Nombre Posición" pegado — pero en este formato vienen como celdas
    // separadas, así que buscamos cuál de las celdas matchea una posición conocida del tarifario.
    let posicionDetectada = '';
    let idxPosicion = textCells.length;
    for (let k = textCells.length - 1; k >= 0; k--) {
      if (posicionesValidas.some(pv => textCells[k].toLowerCase().includes(pv.toLowerCase()) || pv.toLowerCase().includes(textCells[k].toLowerCase()))) {
        posicionDetectada = posicionesValidas.find(pv => textCells[k].toLowerCase().includes(pv.toLowerCase()) || pv.toLowerCase().includes(textCells[k].toLowerCase()));
        idxPosicion = k;
        break;
      }
    }
    const nombreCompleto = textCells.slice(0, idxPosicion);
    const apellido = nombreCompleto[0] || '';
    const nombre = nombreCompleto.slice(1).join(' ');

    if (!apellido) continue;

    // Contar jornadas: cualquier marca que empiece con "P" (incluye "P (una hora tarde)")
    const marcas = row.slice(primeraMarcaIdx);
    let jornadas = 0;
    marcas.forEach(it => {
      const txt = it.text.trim().toUpperCase();
      if (txt.startsWith('P')) jornadas++;
    });

    const per = APP.personal.find(p =>
      p.apellido.toLowerCase() === apellido.toLowerCase() &&
      (!nombre || !p.nombre || p.nombre.toLowerCase().split(' ')[0] === nombre.toLowerCase().split(' ')[0])
    );

    personas.push({
      _id: uid(), apellido, nombre, cuil: '', posicion: posicionDetectada || per?.posicion || '',
      jornadas, jornadasFinde: 0, existeId: per?.id || null, esNuevo: !per
    });
  }

  if (!personas.length) { alert('No encontré personas en el PDF. Verificá el formato de la planilla.'); return; }

  // Deduplicar: si hay personas repetidas (apellido+nombre igual), quedarse con la que tenga más jornadas
  const dedup = {};
  personas.forEach(p => {
    const key = `${p.apellido}|${p.nombre}`.toLowerCase();
    if (!dedup[key] || p.jornadas > dedup[key].jornadas) dedup[key] = p;
  });
  const personasDedup = Object.values(dedup);

  mostrarVerificacionFija(personasDedup, mesId, lugarId);
}

// Parsea filas extraídas del PDF de Campo de Polo. Formato: Apellido y Nombre, CUIL (11 dígitos),
// FUNCION, y luego una celda con monto en pesos (ej: "$32,614") por cada jornada presente.
// No usa "P" como marca — la presencia se indica con el monto de esa jornada.
function parsePlanillaFijaPDF_Polo(pdfRows, mesId, lugarId) {
  const personas = [];
  for (let i = 0; i < pdfRows.length; i++) {
    const row = pdfRows[i];
    const cuilItem = row.find(it => /^\d{11}$/.test(it.text.replace(/\D/g,'')) && it.text.replace(/\D/g,'').length === 11);
    if (!cuilItem) continue; // las filas de datos en este formato siempre tienen CUIL
    const cuil = cuilItem.text.replace(/\D/g,'');
    const cuilIdx = row.indexOf(cuilItem);

    // Antes del CUIL: "Apellido Nombre" en una sola celda de texto
    const apellidoNombre = (row[cuilIdx - 1]?.text || '').trim();
    const partes = apellidoNombre.split(/\s+/);
    const apellido = partes[0] || '';
    const nombre = partes.slice(1).join(' ');
    if (!apellido) continue;

    // Después del CUIL: la celda de FUNCION (texto), luego las marcas de monto ($X,XXX) por jornada
    const funcion = (row[cuilIdx + 1]?.text || '').trim();

    // Contar jornadas: cualquier celda con formato de monto en pesos ($N,NNN o similar)
    const marcas = row.slice(cuilIdx + 2);
    let jornadas = 0;
    marcas.forEach(it => {
      const txt = it.text.trim();
      if (/^\$[\d.,]+$/.test(txt)) jornadas++;
    });

    const per = APP.personal.find(p =>
      (p.cuil && p.cuil.replace(/\D/g,'') === cuil) ||
      p.apellido.toLowerCase() === apellido.toLowerCase()
    );

    personas.push({
      _id: uid(), apellido, nombre, cuil, posicion: per?.posicion || '',
      jornadas, jornadasFinde: 0, existeId: per?.id || null, esNuevo: !per
    });
  }

  if (!personas.length) { alert('No encontré personas con CUIL válido en el PDF.'); return; }
  mostrarVerificacionFija(personas, mesId, lugarId);
}

// Router: decide qué parser de PDF usar según el lugar
function parsePlanillaFijaPDF(pdfRows, mesId, lugarId) {
  if (lugarId === 'teatro-colon') return parsePlanillaFijaPDF_Colon(pdfRows, mesId, lugarId);
  if (lugarId === 'campo-de-polo') return parsePlanillaFijaPDF_Polo(pdfRows, mesId, lugarId);
  return parsePlanillaFijaPDF_SinCuil(pdfRows, mesId, lugarId);
}

function parsePlanillaFija(rows, mesId, lugarId) {
  const areaLugar = LUGARES_FIJOS.find(l => l.id === lugarId)?.nombre;
  let hi = -1, cB = -1, cN = -1, cC = -1, cPos = -1, cFechaStart = -1;
  let nombreJunto = false;

  for (let i = 0; i < Math.min(rows.length, 5); i++) {
    const row = rows[i];
    if (!row) continue;
    for (let j = 0; j < row.length; j++) {
      const v = String(row[j]||'').trim().toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
      if (v === 'APELLIDO') { cB = j; hi = i; }
      if (v === 'APELLIDO Y NOMBRE') { cB = j; hi = i; nombreJunto = true; }
      if (v === 'NOMBRE') cN = j;
      if (v.includes('CUIL')) cC = j;
      if (v === 'FUNCION' || v === 'FUNCION' || v.includes('POSICION')) cPos = j;
    }
    if (hi === i) break;
  }

  if (hi === -1) { alert('No encontré el encabezado. Verificá que la planilla tenga columna APELLIDO o APELLIDO Y NOMBRE.'); return; }

  const headerRow = rows[hi];
  for (let j = Math.max(cC||0, cPos||0, cN||0, cB||0) + 1; j < (headerRow||[]).length; j++) {
    const v = headerRow[j];
    if (v instanceof Date) { cFechaStart = j; break; }
    const vs = String(v||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    if (['lunes','martes','miercoles','jueves','viernes','sabado','domingo'].includes(vs)) {
      cFechaStart = j; break;
    }
  }
  if (cFechaStart === -1) cFechaStart = Math.max(cC||0, cPos||0, cN||0, cB||0) + 1;

  // Detectar columna TOTAL para excluirla del conteo de jornadas
  let cTotal = -1;
  if (headerRow) {
    for (let j = cFechaStart; j < headerRow.length; j++) {
      const v = String(headerRow[j]||"").toUpperCase().trim();
      if (v === "TOTAL" || v === "TOTAL DIAS" || v === "TOTAL JORNADAS") { cTotal = j; break; }
    }
  }

  // Detectar columnas de fin de semana (sábado=6, domingo=0) usando fechas reales si están disponibles
  // Busca una fila con valores Date entre hi y hi+2 para usar como referencia de día de semana
  const finde = {}; // { colIndex: true } si esa columna es sábado o domingo
  for (let r = hi; r <= Math.min(hi + 2, rows.length - 1); r++) {
    const fr = rows[r];
    if (!fr) continue;
    let foundDate = false;
    for (let j = cFechaStart; j < (cTotal !== -1 ? cTotal : fr.length); j++) {
      if (fr[j] instanceof Date) {
        const dow = fr[j].getDay(); // 0=domingo, 6=sabado
        if (dow === 0 || dow === 6) finde[j] = true;
        foundDate = true;
      }
    }
    if (foundDate) break;
  }
  // Fallback: si no hay fechas reales, usar letras de día en el header (S=sabado, D=domingo)
  if (Object.keys(finde).length === 0 && headerRow) {
    for (let j = cFechaStart; j < (cTotal !== -1 ? cTotal : headerRow.length); j++) {
      const v = String(headerRow[j]||'').trim().toUpperCase();
      if (v === 'S' || v === 'D' || v === 'SAB' || v === 'DOM') finde[j] = true;
    }
  }

  // Para Campo de Polo, los datos empiezan en hi+2 (saltando la fila de fechas)
  // Para Ecoparque, los datos empiezan en hi+1
  let dataStart = hi + 1;
  // Detectar si la fila hi+1 es una fila de fechas (tiene Date en la posición de fechas)
  const nextRow = rows[hi + 1];
  if (nextRow && cFechaStart >= 0 && nextRow[cFechaStart] instanceof Date) {
    dataStart = hi + 2;
  }

  // Si no detectó CUIL por encabezado, intentar col C (índice 2) — Campo de Polo
  if (cC === -1) {
    for (let i = dataStart; i < Math.min(rows.length, dataStart + 3); i++) {
      const testVal = rows[i] ? String(rows[i][2]||'').replace('.0','').replace(/\D/g,'') : '';
      if (testVal.length >= 10) { cC = 2; break; }
    }
  }

  const personas = [];
  for (let i = dataStart; i < rows.length; i++) {
    const row = rows[i];
    if (!row || row[cB] === null || row[cB] === undefined || row[cB] === '') continue;
    const apellidoNombre = String(row[cB]||'').trim();
    if (!apellidoNombre) continue;

    // Cortar si encontramos un encabezado secundario (segunda seccion de la planilla)
    const apellidoUp = apellidoNombre.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
    if (apellidoUp === "NOMBRE" || apellidoUp === "APELLIDO" || apellidoUp === "APELLIDO Y NOMBRE") break;
    const col0 = String(row[0]||"").toUpperCase().trim();
    if (col0 === "PUESTO") break;

    let apellido = apellidoNombre, nombre = '';
    if (nombreJunto) {
      const partes = apellidoNombre.split(' ');
      apellido = partes[0];
      nombre = partes.slice(1).join(' ');
    } else {
      nombre = cN >= 0 ? String(row[cN]||'').trim() : '';
    }

    let posicion = '';
    if (cPos >= 0) posicion = String(row[cPos]||'').trim();
    else if (row[3] && typeof row[3] === 'string' && !/^\d+$/.test(row[3].trim())) posicion = String(row[3]).trim();

    let cuil = '';
    if (cC >= 0) cuil = String(row[cC]||'').replace(/\.0$/, '').replace(/\D/g, '');

    let jornadas = 0, jornadasFinde = 0;
    const jEnd = cTotal !== -1 ? cTotal : row.length;
    for (let j = cFechaStart; j < jEnd; j++) {
      const v = row[j];
      if (v === null || v === undefined || v === '') continue;
      const str = String(v).trim().toUpperCase();
      // Solo Teatro Colón separa jornadas de semana/finde (tarifa diferencial). Los demás lugares
      // (Ecoparque, Campo de Polo) cuentan todo como una sola jornada, sin distinción de día.
      const esFinde = lugarId === 'teatro-colon' && !!finde[j];
      if (str === 'P') { if (esFinde) jornadasFinde++; else jornadas++; continue; }
      if (str === '-' || str === 'A') continue;
      const num = parseFloat(String(v).replace(',', '.'));
      if (!isNaN(num) && num > 0) { if (esFinde) jornadasFinde++; else jornadas++; }
    }

    if (!apellido) continue;

    const posicionMapeada = posicion ? mapToTarifario(posicion, areaLugar) : '';
    const per = APP.personal.find(p =>
      (cuil && p.cuil && p.cuil.replace(/\D/g,'') === cuil) ||
      (p.apellido.toLowerCase() === apellido.toLowerCase() && (!nombre || p.nombre.toLowerCase().startsWith(nombre.toLowerCase().split(' ')[0].toLowerCase())))
    );

    personas.push({
      _id: uid(), apellido, nombre, cuil, posicion: posicionMapeada || posicion,
      jornadas, jornadasFinde, existeId: per?.id || null, esNuevo: !per
    });
  }

  if (!personas.length) { alert('No encontré personas en la planilla.'); return; }
  mostrarVerificacionFija(personas, mesId, lugarId);
}

window.calcFilaFijaVer = function(id, lugarId) {
  const jornadas = parseInt(document.getElementById('pfjor-'+id)?.value) || 0;
  const jornadasFinde = lugarId==='teatro-colon' ? (parseInt(document.getElementById('pfjorf-'+id)?.value) || 0) : 0;
  const posicion  = document.getElementById('pfpos-'+id)?.value;
  const sub = calcSubtotalFijo(posicion, jornadas, jornadasFinde);
  const subEl = document.getElementById('pfsub-'+id); if (subEl) subEl.textContent = fmt(sub);
  // Recalcular total
  let total = 0;
  document.querySelectorAll('[id^="pfsub-"]').forEach(el => {
    const n = parseFloat(el.textContent.replace(/[^0-9]/g,'')) || 0; total += n;
  });
  const totEl = document.getElementById('pf-total'); if (totEl) totEl.textContent = fmt(total);
};

window.confirmarPlanillaFija = async function(mesId, lugarId) {
  const draft = window._fijoDraft;
  if (!draft) return;
  loading(true);

  const meses = getMesesFijos();
  const mes = meses.find(m => m.id === mesId);
  if (!mes.presentes) mes.presentes = {};

  const presentesLugar = [];
  for (const p of draft.personas) {
    const jornadas = parseInt(document.getElementById('pfjor-'+p._id)?.value) || 0;
    const jornadasFinde = lugarId==='teatro-colon' ? (parseInt(document.getElementById('pfjorf-'+p._id)?.value) || 0) : 0;
    const posicion  = document.getElementById('pfpos-'+p._id)?.value;

    // Agregar persona nueva si no existe
    if (p.esNuevo) {
      const { data: np } = await sb.from('personal').insert({
        nombre: p.nombre, apellido: p.apellido, cuil: p.cuil,
        area: 'Servicios Fijos', lugar_fijo: lugarId, posicion, activo: true
      }).select().single();
      p.existeId = np?.id;
    }

    presentesLugar.push({ personaId: p.existeId, apellido: p.apellido, nombre: p.nombre, cuil: p.cuil, posicion, jornadas, jornadasFinde });
  }

  mes.presentes[lugarId] = presentesLugar;
  saveMesesFijos(meses);
  loading(false);
  window._fijoDraft = null;
  toast('Planilla importada', 'ok');
  await go('fijos');
};

window.liquidarLugarFijo = async function(mesId, lugarId) {
  const lugar = LUGARES_FIJOS.find(l => l.id === lugarId);
  const meses = getMesesFijos();
  const mes = meses.find(m => m.id === mesId);
  const presentes = mes.presentes?.[lugarId] || [];
  if (!presentes.length) { alert('No hay presentes cargados para este lugar.'); return; }

  const rows = [], sinTarifa = [];
  for (const p of presentes) {
    const jf = p.jornadasFinde || 0;
    if (!p.jornadas && !jf) continue;
    const { tSemana, tFinde } = getTarifaSemanaFinde(p.posicion);
    const tarUnico = APP.tarifario.find(t => t.posicion === p.posicion);
    if (!tSemana && !tFinde && !tarUnico) { sinTarifa.push(`${p.apellido} (${p.posicion})`); continue; }
    const total = calcSubtotalFijo(p.posicion, p.jornadas||0, jf);
    rows.push({
      persona_id: p.personaId, persona_nombre: `${p.apellido}, ${p.nombre}`,
      area: 'Servicios Fijos', lugar_fijo: lugarId, lugar_nombre: lugar.nombre,
      mes_id: mesId, periodo: mes.nombre, posicion: p.posicion,
      jornadas: (p.jornadas||0) + jf, jornadas_semana: p.jornadas||0, jornadas_finde: jf,
      valor_jornada: tSemana?.monto || tarUnico?.monto || 0,
      valor_jornada_finde: tFinde?.monto || null,
      total, estado: 'pendiente'
    });
  }

  if (!rows.length) { alert('No hay jornadas para liquidar.'); return; }

  showModal(`<div class="modal">
    <div class="modal-t">Liquidar — ${lugar.nombre}</div>
    <div class="modal-s">${mes.nombre} · ${rows.length} personas · ${fmt(rows.reduce((s,r)=>s+r.total,0))} total</div>
    ${sinTarifa.length ? `<div class="alert alert-warn"><i class="ti ti-alert-triangle"></i> Sin tarifa: ${sinTarifa.join(', ')}</div>` : ''}
    <div style="max-height:220px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px">
      ${rows.map(r => `<div style="display:flex;justify-content:space-between;padding:7px 11px;border-bottom:1px solid var(--border);font-size:12.5px">
        <span>${r.persona_nombre}</span>
        <span style="display:flex;gap:9px">
          <span style="color:var(--text2)">${r.posicion} · ${r.jornadas_finde ? `${r.jornadas_semana} L-V + ${r.jornadas_finde} S/D` : `${r.jornadas} jornadas`}</span>
          <strong>${fmt(r.total)}</strong>
        </span>
      </div>`).join('')}
    </div>
    <div style="display:flex;justify-content:space-between;padding:10px;background:var(--bg3);border-radius:var(--radius)">
      <span style="font-weight:500">Total</span>
      <span style="font-size:18px;font-weight:600">${fmt(rows.reduce((s,r)=>s+r.total,0))}</span>
    </div>
    <div class="modal-f">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-success" onclick="confirmarLiqFijoDirecto(${JSON.stringify(rows).replace(/"/g,'&quot;')})"><i class="ti ti-check"></i> Confirmar</button>
    </div>
  </div>`);
};

window.editarLiquidacion = async function(liqId, campo, valor) {
  const num = parseFloat(String(valor).replace(/[^0-9.,-]/g,'').replace(',','.'));
  if (isNaN(num)) return;
  const upd = { [campo]: num };
  // Si se edita jornadas o total individualmente, guardar como está
  // Si se editan jornadas, recalcular total usando valor_jornada guardado
  if (campo === 'jornadas') {
    const liq = APP.liquidaciones.find(l => l.id === liqId);
    if (liq) upd.total = num * (liq.valor_jornada || 0);
  }
  await sb.from('liquidaciones').update(upd).eq('id', liqId);
  // Actualizar en memoria
  const idx = APP.liquidaciones.findIndex(l => l.id === liqId);
  if (idx >= 0) { APP.liquidaciones[idx] = { ...APP.liquidaciones[idx], ...upd }; }
  // Actualizar el total mostrado si cambió por recálculo
  if (campo === 'jornadas') {
    const totalEl = document.getElementById(`liq-total-${liqId}`);
    if (totalEl) totalEl.value = APP.liquidaciones[idx]?.total || 0;
  }
  toast('Guardado', 'ok');
};

window.editarMontoDetalle = async function(liqId, fechaIdx, nuevoMonto) {
  const liq = APP.liquidaciones.find(l => l.id === liqId); if (!liq) return;
  const num = parseFloat(String(nuevoMonto).replace(/[^0-9.,-]/g,'').replace(',','.'));
  if (isNaN(num)) return;
  const detalle = [...(liq.detalle||[])];
  detalle[fechaIdx] = { ...detalle[fechaIdx], monto: num };
  const nuevoTotal = detalle.reduce((s,d) => s+(d.monto||0), 0);
  await sb.from('liquidaciones').update({ detalle, total: nuevoTotal }).eq('id', liqId);
  const idx = APP.liquidaciones.findIndex(l => l.id === liqId);
  if (idx >= 0) APP.liquidaciones[idx] = { ...APP.liquidaciones[idx], detalle, total: nuevoTotal };
  const totalEl = document.getElementById(`liq-total-${liqId}`);
  if (totalEl) totalEl.textContent = fmt(nuevoTotal);
  toast('Guardado', 'ok');
};

        return `<tr style="font-size:12px;border-top:1px solid var(--border)">
          <td style="padding:6px 10px"><strong>${p.apellido}, ${p.nombre}</strong></td>
          <td style="padding:6px 10px;font-family:monospace;font-size:11px">${!lugarCerrado ? `<input type="text" value="${cuil!=='—'?cuil:''}" placeholder="CUIL" style="width:110px;font-family:monospace;font-size:11px" onchange="editarCuilPresente('${mesId}','${lugarId}','${p.apellido}',this.value)">` : cuil}</td>
          <td style="padding:6px 10px">${p.posicion||'—'}</td>
          <td style="padding:6px 10px;text-align:center">${editable ? `<input type="number" value="${liq.jornadas||0}" min="0" style="width:55px;text-align:center" onchange="editarLiquidacion('${liq.id}','jornadas',this.value)">` : (liq?.jornadas||p.jornadas||0)}</td>
          ${lugarId==='teatro-colon'?`<td style="padding:6px 10px;text-align:center">${p.jornadasFinde||0}</td>`:''}
          <td style="padding:6px 10px;text-align:right;font-weight:600">${editable ? `<input type="number" id="liq-total-${liq.id}" value="${sub}" min="0" style="width:110px;font-weight:600;text-align:right" onchange="editarLiquidacion('${liq.id}','total',this.value)">` : fmt(sub)}</td>
        </tr>`;
      }).join('')}
      </tbody><tfoot><tr style="border-top:2px solid var(--border);font-weight:700">
        <td colspan="${lugarId==='teatro-colon'?5:4}" style="padding:8px 10px">Total</td>
        <td style="padding:8px 10px;text-align:right">${fmt(liqs.length ? liqs.reduce((s,l)=>s+(l.total||0),0) : pres.reduce((s,p)=>s+calcSubtotalFijo(p.posicion,p.jornadas||0,p.jornadasFinde||0),0))}</td>
      </tr></tfoot>
      </table>
    </div>
    <div class="modal-f">
      <button class="btn" onclick="closeModal()">Cerrar</button>
      <button class="btn btn-sm" onclick="closeModal();exportDetalleLugarFijo('${mesId}','${lugarId}')"><i class="ti ti-file-spreadsheet"></i> Exportar Excel</button>
    </div>
  </div>`);
};

window.exportDetalleLugarFijo = function(mesId, lugarId) {
  const mes = getMesesFijos().find(m => m.id === mesId);
  const lugar = LUGARES_FIJOS.find(l => l.id === lugarId);
  const pres = mes?.presentes?.[lugarId] || [];
  const liqs = APP.liquidaciones.filter(l => l.mes_id === mesId && l.lugar_fijo === lugarId);
  if (!pres.length) { alert('Sin personas cargadas para exportar'); return; }
  const rows = pres.map(p => {
    const liq = liqs.find(l => l.persona_id === p.personaId);
    const per = APP.personal.find(x => x.id === p.personaId)
      || APP.personal.find(x => x.id === liq?.persona_id);
    const sub = liq ? liq.total : calcSubtotalFijo(p.posicion, p.jornadas||0, p.jornadasFinde||0);
    const cuil = p.cuil || ''; // siempre del localStorage, igual que el ojo
    const esColon = lugarId === 'teatro-colon';
    const row = {
      'Apellido y nombre': normExport(`${p.apellido} ${p.nombre}`),
      'CUIL': cuil,
      'CBU':  per?.cbu || '',
    };
    if (esColon) row['Alias'] = per?.alias || '';
    row['Lugar']   = normExport(lugar.nombre);
    row['Período'] = normExport(mes.nombre);
    row['Posición'] = normExport(p.posicion||'');
    if (esColon) {
      row['Jornadas 6hs'] = p.jornadas||0;
      row['Jornadas 8hs'] = p.jornadasFinde||0;
    } else {
      row['Jornadas'] = (p.jornadas||0) + (p.jornadasFinde||0);
    }
    row['Total ($)'] = sub;
    return row;
  });
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [22,16,26,14,14,14,14,10,10,12,12].map(w => ({ wch:w }));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Presentes');
  XLSX.writeFile(wb, `presentes_${normExport(lugar.nombre).replace(/\s+/g,'_')}_${normExport(mes.nombre).replace(/\s+/g,'_')}.xlsx`);
  toast('Excel exportado', 'ok');
};

window.previaMesFijo = function(mesId) {
  const mes = getMesesFijos().find(m => m.id === mesId);
  const totalMes = liqs.reduce((s,l) => s+(l.total||0), 0);
  showModal(`<div class="modal modal-lg">
    <div class="modal-t">Vista previa — ${mes.nombre}</div>
    <div class="modal-s">${liqs.length} liquidaciones · Total: ${fmt(totalMes)}</div>
    <div style="max-height:420px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px">
      <table style="width:100%"><thead><tr style="font-size:11px;color:var(--text2)">
        <th style="padding:6px 10px;text-align:left">Apellido y nombre</th>
        <th style="padding:6px 10px;text-align:left">CUIL</th>
        <th style="padding:6px 10px;text-align:left">Lugar</th>
        <th style="padding:6px 10px;text-align:left">Posición</th>
        <th style="padding:6px 10px;text-align:center">Jornadas</th>
        <th style="padding:6px 10px;text-align:right">Total</th>
        <th style="padding:6px 10px;text-align:left">Estado</th>
      </tr></thead><tbody>
      ${liqs.map(l => {
        const per = APP.personal.find(x => x.id === l.persona_id);
        return `<tr style="font-size:12px;border-top:1px solid var(--border)">
          <td style="padding:6px 10px"><strong>${per ? `${per.apellido}, ${per.nombre}` : l.persona_nombre}</strong></td>
          <td style="padding:6px 10px;font-family:monospace;font-size:11px">${per?.cuil||'—'}</td>
          <td style="padding:6px 10px"><span class="chip ${chipClaseArea(l.lugar_nombre)}" style="font-size:10px">${l.lugar_nombre||'—'}</span></td>
          <td style="padding:6px 10px">${l.posicion||'—'}</td>
          <td style="padding:6px 10px;text-align:center">${l.jornadas||0}</td>
          <td style="padding:6px 10px;text-align:right;font-weight:600">${fmt(l.total)}</td>
          <td style="padding:6px 10px"><span class="badge ${l.estado==='pagado'?'bs':l.estado==='aprobado'?'bi':'bw'}" style="font-size:10px">${l.estado}</span></td>
        </tr>`;
      }).join('')}
      </tbody><tfoot><tr style="border-top:2px solid var(--border);font-weight:700">
        <td colspan="5" style="padding:8px 10px">Total del mes</td>
        <td style="padding:8px 10px;text-align:right;font-size:15px">${fmt(totalMes)}</td>
        <td></td>
      </tr></tfoot>
      </table>
    </div>
    <div class="modal-f">
      <button class="btn" onclick="closeModal()">Cerrar</button>
      <button class="btn btn-sm" onclick="closeModal();exportMesFijo('${mesId}')"><i class="ti ti-file-spreadsheet"></i> Exportar Excel</button>
    </div>
  </div>`);
};

// ── CERRAR MES DEFINITIVAMENTE ──
window.editarCuilPresente = async function(mesId, lugarId, apellido, nuevoCuil) {
  const cuil = nuevoCuil.replace(/\D/g,'');
  if (cuil.length < 10) return;
  // Actualizar en localStorage
  const meses = getMesesFijos();
  const mes = meses.find(m => m.id === mesId);
  if (mes?.presentes?.[lugarId]) {
    const p = mes.presentes[lugarId].find(x => x.apellido === apellido);
    if (p) { p.cuil = cuil; saveMesesFijos(meses); }
  }
  // Actualizar en Supabase personal si encontramos la persona
  const per = APP.personal.find(x => x.apellido.toLowerCase() === apellido.toLowerCase());
  if (per) {
    await sb.from('personal').update({ cuil }).eq('id', per.id);
    await fetchAll();
  }
  toast('CUIL actualizado', 'ok');
};

window.reabrirLugarFijo = function(mesId, lugarId) {
  const lugar = LUGARES_FIJOS.find(l => l.id === lugarId);
  if (!confirm(`¿Reabrir ${lugar.nombre}? Podrás editar las liquidaciones nuevamente.`)) return;
  const meses = getMesesFijos();
  const idx = meses.findIndex(m => m.id === mesId);
  if (idx >= 0) {
    if (meses[idx].cerradoPorLugar) meses[idx].cerradoPorLugar[lugarId] = false;
    saveMesesFijos(meses);
  }
  toast(`${lugar.nombre} reabierto`, 'ok');
  go('fijos');
};

window.cerrarLugarFijo = async function(mesId, lugarId) {
  const lugar = LUGARES_FIJOS.find(l => l.id === lugarId);
  if (!confirm(`¿Cerrar ${lugar.nombre} definitivamente? Las liquidaciones pasarán a "aprobado".`)) return;
  loading(true);
  const liqs = APP.liquidaciones.filter(l => l.mes_id === mesId && l.lugar_fijo === lugarId && l.estado === 'pendiente');
  for (const l of liqs) {
    await sb.from('liquidaciones').update({ estado: 'aprobado' }).eq('id', l.id);
  }
  // Marcar el lugar como cerrado en localStorage
  const meses = getMesesFijos();
  const idx = meses.findIndex(m => m.id === mesId);
  if (idx >= 0) {
    if (!meses[idx].cerradoPorLugar) meses[idx].cerradoPorLugar = {};
    meses[idx].cerradoPorLugar[lugarId] = true;
    saveMesesFijos(meses);
  }
  await fetchAll();
  loading(false);
  toast(`${lugar.nombre} cerrado — ${liqs.length} liquidaciones aprobadas`, 'ok');
  await go('fijos');
};

window.cerrarMesFijo = async function(mesId) {
  if (!confirm('¿Cerrar este mes definitivamente? Todas las liquidaciones pendientes pasarán a estado "aprobado".')) return;
  loading(true);
  const liqs = APP.liquidaciones.filter(l => l.mes_id === mesId && l.estado === 'pendiente');
  for (const l of liqs) {
    await sb.from('liquidaciones').update({ estado: 'aprobado' }).eq('id', l.id);
  }
  // Marcar el mes como cerrado en localStorage
  const meses = getMesesFijos();
  const idx = meses.findIndex(m => m.id === mesId);
  if (idx >= 0) { meses[idx].cerrado = true; saveMesesFijos(meses); }
  loading(false);
  toast(`Mes cerrado — ${liqs.length} liquidaciones aprobadas`, 'ok');
  await go('fijos');
};

window.exportMesFijo = function(mesId) {
  const mes = getMesesFijos().find(m => m.id === mesId);
  const liqs = APP.liquidaciones.filter(l => l.mes_id === mesId);
  if (!liqs.length) { alert('Sin liquidaciones para exportar'); return; }
  // Usar buildExportRows para formato estándar igual que Arena
  const rows = liqs.map(l => {
    const p = APP.personal.find(x => x.id === l.persona_id);
    const nombre = p ? nombreExport(p.apellido, p.nombre) : normExport(l.persona_nombre||'');
    return {
      'Apellido y nombre': nombre,
      'CUIL':  p?.cuil  || '',
      'CBU':   p?.cbu   || '',
      'Alias': p?.alias || '',
      'Área':  'Servicios Fijos',
      'Lugar': normExport(l.lugar_nombre||''),
      'Período': normExport(l.periodo||mes.nombre),
      'Posición': normExport(l.posicion||''),
      'Jornadas': l.jornadas || 0,
      'Jornadas semana': l.jornadas_semana ?? '',
      'Jornadas finde': l.jornadas_finde ?? '',
      'Valor jornada ($)': l.valor_jornada || '',
      'Valor jornada finde ($)': l.valor_jornada_finde || '',
      'Total ($)': l.total,
      'Estado': l.estado,
      'Fecha creación': l.created_at ? new Date(l.created_at).toLocaleDateString('es-AR') : '',
    };
  });
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [22,16,26,14,14,14,14,14,10,10,10,16,16,12,12,14].map(w => ({ wch:w }));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Liquidaciones');
  XLSX.writeFile(wb, `liquidaciones_fijos_${normExport(mes.nombre).replace(/\s+/g,'_')}.xlsx`);
  toast('Excel exportado', 'ok');
};


function showModal(html) {
  let o = document.getElementById('mo');
  if (!o) { o = document.createElement('div'); o.id = 'mo'; o.className = 'mo'; document.body.appendChild(o); }
  o.innerHTML = html; o.style.display = 'flex';
  o.onclick = e => { if (e.target === o) closeModal(); };
}
window.closeModal = () => { const o = document.getElementById('mo'); if (o) o.style.display = 'none'; };

// Enter en login
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('login-page').style.display !== 'none') doLogin();
});

// ══════════════════════════════════════════════
// INACTIVIDAD — cerrar sesión a los 5 minutos sin uso
// ══════════════════════════════════════════════
let inactivityTimer;
const INACTIVITY_MS = 5 * 60 * 1000; // 5 minutos

function resetInactivityTimer() {
  clearTimeout(inactivityTimer);
  inactivityTimer = setTimeout(async () => {
    await sb.auth.signOut();
    location.reload();
  }, INACTIVITY_MS);
}

['click','keydown','mousemove','touchstart','scroll'].forEach(ev => {
  document.addEventListener(ev, resetInactivityTimer, { passive: true });
});
</script>
